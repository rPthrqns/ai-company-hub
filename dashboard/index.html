<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Company Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--panel:#111827;--card:#1e293b;--border:#1e3a5f;--text:#e0e0e0;--dim:#64748b;--accent:#3b82f6;--green:#00ff88;--yellow:#fbbf24;--red:#ef4444}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:6px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.header h1{font-size:14px;white-space:nowrap}.header h1 span{color:#7b68ee}
.tabs{display:flex;gap:4px;flex:1;overflow-x:auto;margin:0 8px}
.tab{background:var(--card);border:1px solid transparent;border-radius:6px;padding:4px 10px;font-size:11px;color:var(--dim);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:#1e3a5f;border-color:var(--accent);color:white}
.tab .dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.tab .x{margin-left:4px;cursor:pointer;color:var(--dim);font-size:9px}
.main{display:grid;grid-template-columns:1fr 380px;gap:8px;padding:8px;height:calc(100vh - 42px)}
.panel{background:var(--panel);border-radius:8px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;padding:4px 8px;border-bottom:1px solid var(--border);gap:4px;flex-shrink:0}
.toolbar span{font-size:10px;font-weight:600;color:var(--dim)}
.btn{background:var(--card);border:1px solid #374151;border-radius:4px;padding:2px 6px;font-size:9px;color:var(--dim);cursor:pointer;text-decoration:none}
.btn:hover{border-color:var(--accent);color:var(--text)}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
/* Swimlane */
.lane{display:flex;align-items:stretch;border-bottom:1px solid #1e293b;min-height:44px}
.lane-label{width:70px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;border-right:1px solid #1e293b;background:#0f172a;cursor:pointer}
.lane-label:hover{background:#1a2332}
.lane-track{flex:1;display:flex;align-items:center;gap:3px;padding:4px 6px;overflow-x:auto;flex-wrap:wrap}
.ev{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:9px;white-space:nowrap;flex-shrink:0;animation:fadeIn .3s}
.ev.work{background:linear-gradient(135deg,#1c1917,#292524);border:1px solid #92400e;color:#fbbf24}
.ev.done{background:linear-gradient(135deg,#052e16,#064e3b);border:1px solid #065f46;color:#6ee7b7}
.ev.mention{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid #4338ca;color:#a78bfa}
.ev.pending{background:linear-gradient(135deg,#1a1500,#2a2000);border:1px solid #92400e;color:#fbbf24}
.ev.think{border:1px dashed #92400e;color:#fbbf24;animation:pulse 1.5s infinite}
.ev .btns{display:inline-flex;gap:2px;margin-left:3px}
.ev .btns button{background:rgba(255,255,255,.1);border:none;border-radius:3px;color:inherit;font-size:8px;padding:1px 5px;cursor:pointer}
.arrow{color:#334155;font-size:8px}
.vtab{background:transparent;border:none;padding:4px 8px;border-radius:4px;font-size:10px;color:var(--dim);cursor:pointer}
.vtab:hover{color:var(--text);background:#1a2332}
.vtab.active{color:white;background:var(--accent)}
.task-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;margin-bottom:2px;font-size:10px;background:var(--card);border-left:3px solid var(--dim)}
.task-item.done{border-left-color:var(--green);opacity:.7}
.task-item.progress{border-left-color:var(--yellow)}
.file-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-bottom:1px solid #1e293b;font-size:10px;cursor:pointer}
.file-item:hover{background:#1a2332}
.appr-card{background:var(--card);border-radius:6px;padding:8px;margin-bottom:6px;border-left:3px solid var(--yellow)}
.appr-card .appr-btns{display:flex;gap:4px;margin-top:4px}
.appr-card .appr-btns button{border:none;border-radius:4px;padding:3px 10px;font-size:9px;cursor:pointer}
/* Chat */
.messages{flex:1;overflow-y:auto;padding:8px}
.msg{display:flex;gap:6px;padding:4px 0;animation:fadeIn .2s}
.msg .av{width:28px;height:28px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg .name{font-size:10px;font-weight:600;color:#60a5fa;margin-bottom:1px}
.msg .text{font-size:11px;line-height:1.5;word-break:break-word}
.msg.sys{justify-content:center;padding:6px;font-size:10px;color:var(--dim)}
.input-area{display:flex;gap:6px;padding:8px;border-top:1px solid var(--border)}
.input-area input{flex:1;background:var(--card);border:1px solid #374151;border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;outline:none}
.input-area input:focus{border-color:var(--accent)}
.send-btn{background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600}
.mention{display:inline-block;background:var(--card);border:1px solid #374151;border-radius:6px;padding:2px 6px;font-size:10px;cursor:pointer;margin:2px}
.mention:hover{border-color:var(--accent)}
.typing{display:none;padding:4px 12px;font-size:10px;color:var(--dim)}.typing.show{display:block}
/* Banner */
.banner{background:#1a1500;border-bottom:1px solid #332200;padding:4px 16px;display:none;align-items:center;gap:8px;font-size:10px;color:#fbbf24}
.banner.show{display:flex}
.banner .btns button{border:1px solid #92400e;border-radius:3px;padding:2px 6px;font-size:9px;cursor:pointer;background:transparent;color:#fbbf24}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:400px}
.modal h2{font-size:16px;margin-bottom:12px}
.modal label{display:block;font-size:11px;color:var(--dim);margin:8px 0 4px}
.modal input,.modal select{width:100%;background:var(--card);border:1px solid #374151;border-radius:8px;padding:8px;color:var(--text);font-size:12px;outline:none;box-sizing:border-box}
.modal-acts{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.preset{background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 8px;font-size:10px;color:var(--dim);cursor:pointer}
.preset:hover{border-color:var(--accent);color:var(--text)}
/* Toast */
.toasts{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:6px}
.toast{background:#1e293b;color:var(--text);padding:8px 16px;border-radius:8px;font-size:11px;border-left:3px solid var(--accent)}
/* Empty */
.empty{display:none;text-align:center;padding:60px 20px;color:var(--dim)}
/* Lang overlay */
.lang-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;align-items:center;justify-content:center}
/* Misc */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
</style>
</head>
<body>

<!-- Language Setup -->
<div class="lang-overlay" id="lang-overlay">
  <div style="background:linear-gradient(145deg,#0f172a,#1e293b);border:1px solid #334155;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🌍</div>
    <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px">Welcome to AI Company Hub</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:20px">Type your language to set up the interface</div>
    <input id="lang-input" placeholder="e.g. Korean, English, 日本語..." style="width:100%;background:#0f172a;border:2px solid #334155;border-radius:10px;padding:12px;color:#f1f5f9;font-size:14px;text-align:center;outline:none;box-sizing:border-box" onkeydown="if(event.key==='Enter')genLang()">
    <div id="lang-status" style="font-size:11px;color:var(--dim);margin-top:10px;min-height:20px"></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
      <button onclick="genLang()" id="lang-btn" class="btn-primary" style="padding:10px 24px;font-size:13px">🚀 Set Up</button>
      <button onclick="skipLang()" style="background:transparent;color:var(--dim);border:1px solid #334155;border-radius:8px;padding:10px 16px;font-size:12px;cursor:pointer">Skip</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <h1>🏢 <span>AI Company Hub</span></h1>
  <div class="tabs" id="tabs"></div>
  <span id="hdr-stats" style="font-size:9px;color:var(--dim)"></span>
  <input id="search" placeholder="🔍" style="background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 6px;color:var(--text);font-size:10px;width:70px;outline:none" oninput="debounceSearch(this.value)" onfocus="this.style.width='150px'" onblur="if(!this.value)this.style.width='70px'">
  <div id="search-results" style="display:none;position:fixed;top:38px;right:60px;width:340px;background:#111827;border:1px solid #334155;border-radius:8px;z-index:150;max-height:350px;overflow-y:auto"></div>
  <button onclick="resetLang()" class="btn" title="언어">🌍</button>
  <button onclick="openCreate()" class="btn-primary">＋</button>
</div>

<!-- Approval Banner -->
<div class="banner" id="banner"></div>

<!-- Empty State -->
<div class="empty" id="empty">
  <div style="font-size:48px;margin-bottom:12px">🏢</div>
  <p>아직 회사가 없습니다</p>
  <button onclick="openCreate()" class="btn-primary" style="margin-top:20px;padding:10px 24px;font-size:14px">＋ 새 회사 만들기</button>
</div>

<!-- Main -->
<div class="main" id="main" style="display:none">
  <!-- Left panel: tabs + content -->
  <div class="panel" style="padding:0">
    <div style="display:flex;align-items:center;padding:3px 6px;border-bottom:1px solid var(--border);gap:2px;flex-shrink:0">
      <button class="vtab active" onclick="switchView('timeline')">⚡ 타임라인</button>
      <button class="vtab" onclick="switchView('tasks')">📋 작업</button>
      <button class="vtab" onclick="switchView('approvals')">🔔 관리</button>
      <button class="vtab" onclick="switchView('files')">📂 자료</button>
      <div style="margin-left:auto;display:flex;gap:3px">
        <button onclick="openAgent()" class="btn">＋</button>
        <a href="#" onclick="event.preventDefault();dl()" class="btn">📦</a>
      </div>
    </div>
    <!-- Views -->
    <div id="v-timeline" style="flex:1;overflow:auto"></div>
    <div id="v-tasks" style="flex:1;overflow:auto;padding:8px;display:none">
      <div style="font-size:10px;font-weight:600;color:var(--dim);margin-bottom:6px">📋 칸반 대기열</div>
      <div id="kanban"></div>
      <div style="margin-top:12px;font-size:10px;font-weight:600;color:var(--dim);margin-bottom:6px">📋 계획 트리</div>
      <div id="plan-tree"></div>
    </div>
    <div id="v-approvals" style="flex:1;overflow:auto;padding:8px;display:none">
      <div style="font-size:10px;font-weight:600;color:var(--dim);margin-bottom:6px">🔔 기안결재</div>
      <div id="approval-list"></div>
    </div>
    <div id="v-files" style="flex:1;overflow:auto;padding:8px;display:none">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">
        <span style="font-size:10px;font-weight:600;color:var(--dim)">📂 결과물</span>
        <a href="#" onclick="event.preventDefault();dl()" style="margin-left:auto;font-size:9px;color:var(--accent);text-decoration:none">📦 ZIP 다운로드</a>
      </div>
      <div id="file-list"></div>
      <div style="margin-top:12px;font-size:10px;font-weight:600;color:var(--dim);margin-bottom:6px">📊 리포트</div>
      <div id="report"></div>
    </div>
  </div>
  <!-- Chat -->
  <div class="panel" style="padding:0">
    <div style="padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--dim)">💬 채팅</div>
    <div id="mentions" style="padding:4px 8px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:2px"></div>
    <div class="messages" id="msgs"></div>
    <div class="typing" id="typing"><span id="typing-who">...</span></div>
    <div class="input-area">
      <input id="chat-in" placeholder="@멘션으로 에이전트에게 지시" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}">
      <button class="send-btn" onclick="send()">전송</button>
    </div>
  </div>
</div>

<!-- Create Company Modal -->
<div class="overlay" id="create-modal">
  <div class="modal">
    <h2>🏢 새 회사 만들기</h2>
    <label>회사명</label><input id="c-name" placeholder="예: O2O 마케팅 프로젝트">
    <label>주제 / 목표</label><input id="c-topic" placeholder="예: 온라인 비즈니스">
    <div class="modal-acts">
      <button onclick="document.getElementById('create-modal').classList.remove('show')" style="background:transparent;border:1px solid #374151;color:var(--dim);border-radius:8px;padding:8px 16px;cursor:pointer">취소</button>
      <button onclick="createCo()" class="btn-primary" style="padding:8px 16px">생성</button>
    </div>
  </div>
</div>

<!-- Add Agent Modal -->
<div class="overlay" id="agent-modal">
  <div class="modal">
    <h2>🤖 에이전트 추가</h2>
    <label>빠른 선택</label>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
      <button class="preset" onclick="fp('COO','운영총괄','⚙️')">⚙️ COO</button>
      <button class="preset" onclick="fp('CFO','재무','💰')">💰 CFO</button>
      <button class="preset" onclick="fp('HR','인사','👥')">👥 HR</button>
      <button class="preset" onclick="fp('Designer','디자인','🎨')">🎨 Design</button>
      <button class="preset" onclick="fp('Developer','개발','👨‍💻')">👨‍💻 Dev</button>
      <button class="preset" onclick="fp('PM','프로젝트 관리','📋')">📋 PM</button>
      <button class="preset" onclick="fp('Sales','영업','📊')">📊 Sales</button>
      <button class="preset" onclick="fp('SEO','검색최적화','🔍')">🔍 SEO</button>
    </div>
    <label>이름</label><input id="a-name" placeholder="예: SEO Manager">
    <label>역할</label><input id="a-role" placeholder="예: SEO 최적화">
    <input id="a-emoji" value="🤖" style="display:none">
    <label>상위 소속</label><select id="a-parent"><option value="">리더 직속</option></select>
    <label>AI 모델</label><select id="a-model"><option value="">기본</option></select>
    <div class="modal-acts">
      <button onclick="document.getElementById('agent-modal').classList.remove('show')" style="background:transparent;border:1px solid #374151;color:var(--dim);border-radius:8px;padding:8px 16px;cursor:pointer">취소</button>
      <button onclick="addAgent()" class="btn-primary" style="padding:8px 16px">추가</button>
    </div>
  </div>
</div>

<script>
// ─── i18n ───
const UI={ko:{},en:{}};
let lang=localStorage.getItem('hub-lang')||'ko';
function _e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ─── Lang Setup ───
async function checkLang(){
  const o=document.getElementById('lang-overlay');
  if(!localStorage.getItem('hub-lang')){o.style.display='flex';return}
  o.style.display='none';
  try{const r=await fetch(`/api/i18n/${lang}`);if(r.ok){const s=await r.json();UI[lang]=s;}}catch(e){}
}
async function genLang(){
  const v=document.getElementById('lang-input').value.trim();if(!v)return;
  const b=document.getElementById('lang-btn'),s=document.getElementById('lang-status');
  b.disabled=true;b.textContent='⏳...';s.textContent='Translating...';s.style.color='#60a5fa';
  try{const r=await fetch('/api/i18n/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:v})});const d=await r.json();
    if(d.ok){s.textContent='✅';localStorage.setItem('hub-lang',d.lang_code);lang=d.lang_code;setTimeout(()=>document.getElementById('lang-overlay').style.display='none',500)}
    else{s.textContent='❌ '+d.error;s.style.color='#ef4444';b.disabled=false;b.textContent='🚀 Retry'}}
  catch(e){s.textContent='❌';b.disabled=false;b.textContent='🚀 Retry'}
}
function skipLang(){localStorage.setItem('hub-lang','en');lang='en';document.getElementById('lang-overlay').style.display='none'}
function resetLang(){localStorage.removeItem('hub-lang');document.getElementById('lang-overlay').style.display='flex'}

// ─── State ───
let cos=[],cur=null,lastLen=0,approvals=[],tasks=[],costs=null;
const thinking={},swim={};

// ─── Core ───
async function load(){
  try{cos=(await(await fetch('/api/companies')).json())}catch(e){cos=[]}
  renderTabs();
  if(!cos.length){$('empty').style.display='';$('main').style.display='none'}
  else{$('empty').style.display='none';$('main').style.display='';if(!cur||!cos.find(c=>c.id===cur))sel(cos[0].id);else refresh()}
}
function $(id){return document.getElementById(id)}
function renderTabs(){$('tabs').innerHTML=cos.map(c=>`<div class="tab ${c.id===cur?'active':''}" onclick="sel('${c.id}')"><span class="dot"></span>${_e(c.name)}<span class="x" onclick="event.stopPropagation();delCo('${c.id}','${_e(c.name)}')">✕</span></div>`).join('')}
async function sel(id){cur=id;lastLen=0;renderTabs();await refresh()}
async function refresh(){
  if(!cur)return;const c=await(await fetch(`/api/company/${cur}`)).json();
  $('msgs').innerHTML='';
  $('mentions').innerHTML=(c.agents||[]).map(a=>`<span class="mention" onclick="ins('${a.name}')">${a.emoji} @${a.name}</span>`).join('');
  if(c.chat)c.chat.forEach(m=>addMsg(m));lastLen=(c.chat||[]).length;
  Object.keys(swim).forEach(k=>delete swim[k]);
  (c.chat||[]).slice(-15).forEach(m=>{if(m&&m.type!=='system'){const a=(c.agents||[]).find(x=>x.name===m.from);if(a){const mt=(m.text||'').match(/@(\w+)/g);if(mt)addSw(a.id,'mention','→'+mt.map(t=>t.slice(1)).join(','));else if(m.type==='agent')addSw(a.id,(m.text||'').includes('완료')?'done':'work',(m.text||'').substring(0,40))}}});
  renderSwim();extras();
}
async function extras(){
  if(!cur)return;
  try{const[b,c,a]=await Promise.all([fetch(`/api/board-tasks/${cur}`),fetch(`/api/costs/${cur}`),fetch(`/api/approvals/${cur}?status=pending`)]);
    tasks=await b.json();costs=await c.json();approvals=await a.json();renderBanner();renderStats()}catch(e){}
}

// ─── View Switching ───
let curView='timeline';
function switchView(v){
  curView=v;
  document.querySelectorAll('.vtab').forEach(el=>el.classList.toggle('active',el.textContent.includes(v==='timeline'?'타임라인':v==='tasks'?'작업':v==='approvals'?'관리':'자료')));
  ['timeline','tasks','approvals','files'].forEach(id=>{const el=$('v-'+id);if(el)el.style.display=id===v?'':'none'});
  if(v==='timeline')renderSwim();
  if(v==='tasks')renderTasks();
  if(v==='approvals')renderApprList();
  if(v==='files')renderFiles();
}
function renderTasks(){
  const k=$('kanban');if(!k)return;
  if(!tasks.length){k.innerHTML='<div style="color:var(--dim);font-size:10px">작업 없음</div>';return}
  k.innerHTML=tasks.map(t=>{const cls=t.status==='완료'?'done':t.status==='진행중'?'progress':'';
    return`<div class="task-item ${cls}"><span>${t.status==='완료'?'✅':t.status==='진행중'?'🔄':'⬜'}</span><span style="flex:1">${_e(t.title)}</span><span style="color:var(--dim);font-size:8px">${_e(t.agent_id||'')}</span></div>`}).join('');
  const p=$('plan-tree');if(p)p.innerHTML='<div style="color:var(--dim);font-size:9px">CEO가 자동 생성합니다</div>';
}
function renderApprList(){
  const el=$('approval-list');if(!el)return;
  const pend=approvals.filter(a=>a.status==='pending'&&(a.detail||a.title));
  if(!pend.length){el.innerHTML='<div style="color:var(--dim);font-size:10px">대기 중인 결재 없음</div>';return}
  el.innerHTML=pend.map(a=>`<div class="appr-card">
    <div style="font-size:11px;font-weight:600;color:var(--text)">${_e(a.title||a.approval_type||'기안')}</div>
    <div style="font-size:9px;color:var(--dim);margin:2px 0">${_e(a.from_agent||'')} · ${a.time||''}</div>
    <div style="font-size:10px;color:var(--text);white-space:pre-wrap;max-height:80px;overflow-y:auto">${_e((a.detail||'').substring(0,300))}</div>
    <div class="appr-btns">
      <button onclick="resolve('${a.id}','approved')" style="background:#064e3b;color:#6ee7b7">✅ 승인</button>
      <button onclick="resolve('${a.id}','rejected')" style="background:#7f1d1d;color:#fca5a5">❌ 반려</button>
    </div>
  </div>`).join('');
}
function renderFiles(){
  const el=$('file-list');if(!el||!cur)return;
  fetch(`/api/deliverables/${cur}`).then(r=>r.json()).then(files=>{
    if(!files.length){el.innerHTML='<div style="color:var(--dim);font-size:10px">결과물 없음</div>';return}
    el.innerHTML=files.slice(0,30).map(f=>{
      const ext=f.path.split('.').pop().toLowerCase();
      const icon=ext==='md'?'📝':ext==='png'?'🖼️':ext==='json'?'📋':'📄';
      return`<div class="file-item" onclick="window.open('/api/file/${cur}/${f.path}','_blank')"><span>${icon}</span><span style="flex:1;color:#60a5fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${_e(f.path)}</span><span style="color:var(--dim);font-size:8px">${f.modified||''}</span></div>`}).join('');
  }).catch(()=>{el.innerHTML='<div style="color:var(--dim);font-size:10px">로드 실패</div>'});
  const rp=$('report');if(rp)fetch(`/api/newspaper/${cur}`).then(r=>r.json()).then(d=>{rp.innerHTML=d.newspaper?`<div style="font-size:10px;color:var(--text);white-space:pre-wrap;line-height:1.5;background:var(--card);border-radius:6px;padding:8px">${_e(d.newspaper)}</div>`:'<div style="color:var(--dim);font-size:10px">리포트 없음</div>'}).catch(()=>{});
}

// ─── Swimlane ───
function addSw(id,type,text,extra){if(!swim[id])swim[id]=[];swim[id].push({type,text:text||'',t:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),extra:extra||{}});if(swim[id].length>12)swim[id].shift();renderSwim()}
function renderSwim(){
  const el=$('v-timeline');if(!el)return;
  const c=cos.find(x=>x.id===cur);
  if(!c||!c.agents){el.innerHTML='<div style="color:var(--dim);text-align:center;padding:40px;font-size:11px">회사를 선택하세요</div>';return}
  let h='';
  c.agents.forEach(a=>{
    const iT=!!thinking[cur+':'+a.id],sc=iT?'#fbbf24':a.status==='active'?'#22c55e':a.status==='registering'?'#3b82f6':'#64748b';
    const evs=swim[a.id]||[];
    h+=`<div class="lane"><div class="lane-label" title="${_e(a.role||'')}"><span style="font-size:16px">${a.emoji||'🤖'}</span><span style="color:${sc};font-size:8px;font-weight:600">${_e(a.name)}</span></div><div class="lane-track">`;
    if(iT)h+='<div class="ev think">⚡ 생각 중...</div>';
    evs.forEach((e,i)=>{
      const cl=e.type==='done'?'done':e.type==='mention'?'mention':e.type==='approval'?'pending':'work';
      const ic=e.type==='done'?'✅':e.type==='mention'?'↗':e.type==='approval'?'📋':'🔄';
      h+=`<div class="ev ${cl}" title="${e.t}">${ic} ${_e(e.text.substring(0,35))}`;
      if(e.type==='approval'&&e.extra.id)h+=`<span class="btns"><button onclick="resolve('${e.extra.id}','approved')">✅</button><button onclick="resolve('${e.extra.id}','rejected')">❌</button></span>`;
      h+='</div>';if(i<evs.length-1)h+='<span class="arrow">→</span>';
    });
    if(!evs.length&&!iT)h+='<span style="color:var(--dim);font-size:9px">대기 중</span>';
    h+='</div></div>';
  });
  const pend=approvals.filter(a=>a.status==='pending'&&(a.detail||a.title));
  if(pend.length){h+='<div class="lane"><div class="lane-label" style="background:#1a1500"><span style="font-size:14px">📋</span><span style="color:#fbbf24;font-size:8px">결재</span></div><div class="lane-track">';pend.forEach(a=>h+=`<div class="ev pending">${_e((a.title||a.detail||'').substring(0,30))}<span class="btns"><button onclick="resolve('${a.id}','approved')">✅</button><button onclick="resolve('${a.id}','rejected')">❌</button></span></div>`);h+='</div></div>'}
  el.innerHTML=h;
}

// ─── Chat ───
function addMsg(m){
  const el=$('msgs');if(!el)return;
  if(m.type==='system'){el.innerHTML+=`<div class="msg sys">${_e(m.text||'')}</div>`;el.scrollTop=el.scrollHeight;return}
  el.innerHTML+=`<div class="msg"><div class="av">${m.type==='user'?'👤':(m.emoji||'👔')}</div><div><div class="name">${_e(m.from)}</div><div class="text">${_e(m.text||'')}</div></div></div>`;
  el.scrollTop=el.scrollHeight;
}
function ins(n){const i=$('chat-in');i.value+='@'+n+' ';i.focus()}
async function send(){
  const i=$('chat-in'),t=i.value.trim();if(!t||!cur)return;i.value='';
  try{await fetch(`/api/chat/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});$('typing').classList.add('show')}catch(e){}
}

// ─── Approvals ───
function renderBanner(){
  const b=$('banner'),pend=approvals.filter(a=>a.status==='pending'&&(a.detail||a.title));
  if(!pend.length){b.classList.remove('show');return}
  b.classList.add('show');const f=pend[0];
  b.innerHTML=`<span>📋</span><span style="flex:1"><strong>${_e(f.title||'기안')}</strong>${pend.length>1?' +'+(pend.length-1)+'건':''} · ${_e(f.from_agent||'')} · ${_e((f.detail||'').substring(0,40))}</span><span class="btns"><button onclick="resolve('${f.id}','approved')">✅</button><button onclick="resolve('${f.id}','rejected')">❌</button></span>`;
}
async function resolve(id,res){
  try{await fetch(`/api/approval-${res==='rejected'?'reject':'approve'}/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approval_id:id,response:'',resolution:res})});
    toast(res==='approved'?'✅ 승인':'❌ 반려');approvals=approvals.filter(a=>a.id!==id);renderBanner();renderSwim()}catch(e){toast('실패')}
}
function renderStats(){
  const s=$('hdr-stats');if(!s)return;let h='';
  if(costs&&costs.total_cost>0)h+=`<span style="background:#1c1917;padding:2px 6px;border-radius:8px">$${costs.total_cost.toFixed(4)}</span>`;
  if(tasks.length){const d=tasks.filter(t=>t.status==='완료').length;h+=` <span style="background:#0f2744;padding:2px 6px;border-radius:8px">${d}/${tasks.length}</span>`}
  s.innerHTML=h;
}

// ─── Company/Agent CRUD ───
function openCreate(){$('create-modal').classList.add('show')}
async function createCo(){
  const n=$('c-name').value.trim(),t=$('c-topic').value.trim();if(!n)return;
  const r=await(await fetch('/api/companies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,topic:t,lang})})).json();
  if(r.ok){toast('🏢 생성됨');$('create-modal').classList.remove('show');cur=r.company.id;load()}
}
async function delCo(id,name){if(!confirm(`"${name}" 삭제?`))return;await fetch('/api/company/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});toast('삭제됨');cur=null;load()}
function fp(n,r,e){$('a-name').value=n;$('a-role').value=r;$('a-emoji').value=e}
async function openAgent(){
  const s=$('a-parent'),c=cos.find(x=>x.id===cur);s.innerHTML='<option value="">리더 직속</option>';
  if(c)(c.agents||[]).forEach(a=>s.innerHTML+=`<option value="${a.id}">${a.emoji} ${a.name}</option>`);
  const m=$('a-model');m.innerHTML='<option value="">기본</option>';
  try{const r=await(await fetch('/api/models')).json();(r.models||[]).forEach(x=>m.innerHTML+=`<option value="${x.id}">${x.name}</option>`)}catch(e){}
  $('agent-modal').classList.add('show');
}
async function addAgent(){
  const n=$('a-name').value.trim(),r=$('a-role').value.trim();if(!n||!r)return alert('이름과 역할 입력');
  toast(n+' 생성 중...');
  try{const res=await(await fetch(`/api/agent-add/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,role:r,emoji:$('a-emoji').value,parent_agent:$('a-parent').value,model:$('a-model').value})})).json();
    if(res.ok){toast(n+' 추가됨');$('agent-modal').classList.remove('show');refresh()}}catch(e){toast('오류')}
}
function dl(){if(cur)window.open('/api/download/'+cur)}

// ─── Toast ───
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;let s=$('toasts');if(!s){s=document.createElement('div');s.id='toasts';s.className='toasts';document.body.appendChild(s)}s.appendChild(el);setTimeout(()=>el.remove(),3000)}

// ─── Search ───
let _st=null;
function debounceSearch(q){clearTimeout(_st);if(!q||q.length<2){$('search-results').style.display='none';return}_st=setTimeout(()=>doSearch(q),350)}
async function doSearch(q){
  const el=$('search-results');el.style.display='block';el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">검색 중...</div>';
  try{const r=await(await fetch(`/api/search?q=${encodeURIComponent(q)}`)).json();
    if(!r.length){el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">결과 없음</div>';return}
    el.innerHTML=r.slice(0,8).map(x=>`<div style="padding:6px 10px;border-bottom:1px solid #1e293b;cursor:pointer;font-size:10px" onclick="sel('${x.company_id}');$('search-results').style.display='none'"><span style="color:#60a5fa">${_e(x.from||'')}</span> ${_e((x.text||'').substring(0,60))}</div>`).join('')}
  catch(e){el.innerHTML='<div style="padding:8px;color:var(--red);font-size:10px">오류</div>'}
}
document.addEventListener('click',e=>{if(!e.target.closest('#search')&&!e.target.closest('#search-results'))$('search-results').style.display='none'});

// ─── SSE ───
let sseTimer=null;
function connectSSE(){
  if(sseTimer)clearTimeout(sseTimer);
  const es=new EventSource('/api/sse');
  es.addEventListener('init',e=>{try{cos=JSON.parse(e.data);renderTabs()}catch(e){}});
  es.addEventListener('agent_thinking',e=>{try{const d=JSON.parse(e.data);thinking[d.cid+':'+d.agent_id]={};addSw(d.agent_id,'think','생각 중...');if(d.cid===cur){$('typing').classList.add('show');$('typing-who').textContent=(d.agent_id||'').toUpperCase()+' 생각 중...'}}catch(e){}});
  es.addEventListener('agent_done',e=>{try{const d=JSON.parse(e.data);delete thinking[d.cid+':'+d.agent_id];addSw(d.agent_id,'done','완료');if(!Object.keys(thinking).length)$('typing').classList.remove('show');if(d.cid===cur)renderSwim()}catch(e){}});
  es.addEventListener('approval',e=>{try{if(cur)fetch(`/api/approvals/${cur}?status=pending`).then(r=>r.json()).then(d=>{approvals=d;renderBanner()}).catch(()=>{})}catch(e){}});
  es.addEventListener('company_update',e=>{try{const d=JSON.parse(e.data);
    if(d.deleted){cos=cos.filter(c=>c.id!==d.id);renderTabs();if(cur===d.id){cur=cos.length?cos[0].id:null;cur?refresh():load()}return}
    if(!d.company||!d.id)return;const i=cos.findIndex(c=>c.id===d.id);if(i>=0)cos[i]=d.company;else cos.push(d.company);renderTabs();
    if(d.id!==cur)return;const c=d.company,chat=c.chat||[];chat.slice(lastLen).forEach(m=>addMsg(m));lastLen=chat.length;
    const w=(c.agents||[]).filter(a=>a.status==='working').map(a=>a.name);
    if(w.length){$('typing').classList.add('show');$('typing-who').textContent=w.join(', ')+' 작업 중...'}
    else if(!Object.keys(thinking).length)$('typing').classList.remove('show');
    renderSwim()}catch(e){}});
  es.onerror=()=>{es.close();sseTimer=setTimeout(connectSSE,3000)};
}

// ─── Init ───
document.addEventListener('DOMContentLoaded',checkLang);
load();connectSSE();
</script>
