<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Company Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--panel:#111827;--card:#1e293b;--border:#1e3a5f;--text:#e0e0e0;--dim:#64748b;--accent:#3b82f6;--green:#00ff88;--yellow:#fbbf24;--red:#ef4444}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:5px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr h1{font-size:14px;white-space:nowrap}.hdr h1 span{color:#7b68ee}
.tabs{display:flex;gap:4px;flex:1;overflow-x:auto;margin:0 8px}
.tab{background:var(--card);border:1px solid transparent;border-radius:6px;padding:4px 10px;font-size:11px;color:var(--dim);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:#1e3a5f;border-color:var(--accent);color:white}
.tab .x{margin-left:4px;cursor:pointer;color:var(--dim);font-size:9px}
.hdr-stats{font-size:9px;color:var(--dim)}
.hdr-btn{background:var(--card);border:1px solid #374151;border-radius:4px;padding:2px 6px;font-size:9px;color:var(--dim);cursor:pointer;text-decoration:none}
.hdr-btn:hover{border-color:var(--accent);color:var(--text)}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}

/* Banner */
.banner{background:#1a1500;border-bottom:1px solid #332200;padding:4px 16px;display:none;align-items:center;gap:8px;font-size:10px;color:#fbbf24;flex-shrink:0}
.banner.show{display:flex}
.banner button{border:1px solid #92400e;border-radius:3px;padding:2px 6px;font-size:9px;cursor:pointer;background:transparent;color:#fbbf24}

/* Agent Floor */
.floor{flex:1;overflow-y:auto;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start}
.floor:empty::after{content:'회사를 선택하세요';color:var(--dim);font-size:12px;display:block;text-align:center;width:100%;padding-top:80px}

/* Agent Card */
.agent-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  width:calc(33.33% - 8px);min-width:280px;max-width:480px;
  display:flex;flex-direction:column;overflow:hidden;transition:border-color .3s,box-shadow .3s;
  flex-grow:1;
}
.agent-card.thinking{border-color:#92400e;box-shadow:0 0 20px rgba(251,191,36,.15)}
.agent-card.working{border-color:var(--accent);box-shadow:0 0 20px rgba(59,130,246,.15)}

/* Card Header */
.card-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #1e293b}
.card-avatar{width:40px;height:40px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid #334155;position:relative}
.card-avatar .dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--panel)}
.dot-active{background:var(--green)}
.dot-thinking{background:var(--yellow);animation:pulse 1s infinite}
.dot-idle{background:#475569}
.card-name{font-size:13px;font-weight:700;color:#f1f5f9}
.card-role{font-size:9px;color:var(--dim)}
.card-task-badge{margin-left:auto;background:#0f2744;border:1px solid #1e3a5f;border-radius:6px;padding:2px 8px;font-size:9px;color:#60a5fa;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Speech area inside card */
.card-speech{flex:1;padding:8px 12px;overflow-y:auto;min-height:60px;max-height:200px;display:flex;flex-direction:column;gap:6px}
.speech-empty{color:var(--dim);font-size:10px;text-align:center;padding:16px}

/* Speech bubble */
.bubble{
  background:var(--card);border-radius:10px;padding:8px 12px;font-size:11px;line-height:1.6;
  word-break:break-word;border:1px solid #1e293b;animation:bubbleIn .3s ease;position:relative;
}
.bubble::before{
  content:'';position:absolute;top:-6px;left:16px;
  border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:6px solid #1e293b;
}
.bubble .at{color:#a78bfa;font-weight:600;background:rgba(167,139,250,.1);padding:1px 4px;border-radius:3px;cursor:pointer}
.bubble strong{color:#f1f5f9}
.bubble code{background:#0f172a;padding:1px 4px;border-radius:3px;font-size:10px;color:#60a5fa}
.bubble .time{color:var(--dim);font-size:8px;float:right;margin-left:8px}

/* Delegation arrow (shown between bubbles) */
.delegation{
  display:flex;align-items:center;gap:6px;padding:4px 8px;
  background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid #4338ca;border-radius:8px;
  font-size:10px;color:#a78bfa;animation:bubbleIn .3s ease;
}
.delegation .arrow{color:var(--accent);font-weight:700;font-size:14px}

/* Thinking indicator */
.thinking-dots{padding:8px 12px;font-size:10px;color:var(--yellow);display:flex;align-items:center;gap:6px}
.thinking-dots::after{content:'⚡';animation:pulse 1s infinite}

/* Card footer: mini actions */
.card-foot{display:flex;align-items:center;gap:4px;padding:4px 10px;border-top:1px solid #1e293b;font-size:9px;flex-shrink:0}
.card-foot .cnt{color:var(--dim)}
.card-foot button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:9px;padding:2px 4px}
.card-foot button:hover{color:var(--text)}

/* Command Bar */
.cmd-bar{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:6px 16px;display:none;gap:8px;align-items:center}
.cmd-bar.show{display:flex}
.cmd-chips{display:flex;gap:3px;flex-shrink:0;overflow-x:auto}
.cmd-chip{background:var(--card);border:1px solid #374151;border-radius:12px;padding:3px 8px;font-size:10px;cursor:pointer;white-space:nowrap;color:var(--dim)}
.cmd-chip:hover{border-color:var(--accent);color:var(--text)}
.cmd-input{flex:1;background:var(--card);border:1px solid #374151;border-radius:10px;padding:8px 14px;color:var(--text);font-size:13px;outline:none}
.cmd-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.cmd-input::placeholder{color:#475569}
.cmd-send{background:var(--accent);color:white;border:none;border-radius:10px;padding:8px 18px;cursor:pointer;font-size:12px;font-weight:600}

/* Side drawer */
.drawer-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:2px}
.drawer-toggle button{background:var(--panel);border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;padding:8px 4px;cursor:pointer;font-size:12px;color:var(--dim);width:28px;transition:all .15s}
.drawer-toggle button:hover{color:var(--text);background:#1e293b}
.drawer-toggle button.active{color:white;background:var(--accent);border-color:var(--accent)}
.drawer-toggle .badge{position:absolute;top:-2px;right:2px;background:var(--red);color:white;font-size:7px;border-radius:50%;width:12px;height:12px;display:flex;align-items:center;justify-content:center}
.drawer{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--panel);border-left:1px solid var(--border);z-index:40;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.drawer-head h3{font-size:12px;flex:1}
.drawer-head button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.drawer-body{flex:1;overflow-y:auto;padding:8px}

/* Plan Tree */
.plan-tree{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:11px;line-height:1.5}
.plan-node{position:relative;padding-left:20px}
.plan-node::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:#1e3a5f}
.plan-node:last-child::before{height:12px}
.plan-node::after{content:'';position:absolute;left:7px;top:12px;width:10px;height:1px;background:#1e3a5f}
.plan-root>.plan-node::before,.plan-root>.plan-node::after{display:none}
.plan-root>.plan-node{padding-left:0}
.plan-row{display:flex;align-items:center;gap:6px;padding:2px 4px;border-radius:4px;cursor:pointer;transition:background .1s}
.plan-row:hover{background:rgba(59,130,246,.08)}
.plan-chk{width:16px;height:16px;border:2px solid #334155;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:10px}
.plan-chk.done{background:#064e3b;border-color:#22c55e;color:#4ade80}
.plan-chk.progress{background:#1c1917;border-color:#fbbf24;color:#fbbf24}
.plan-chk:hover{border-color:var(--accent);transform:scale(1.1)}
.plan-label{flex:1;color:#e2e8f0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-label.done{color:#64748b;text-decoration:line-through}
.plan-label.progress{color:#fbbf24}
.plan-agent{font-size:9px;color:#475569;background:#0f172a;padding:1px 5px;border-radius:3px;flex-shrink:0}
.plan-acts{display:none;gap:2px;flex-shrink:0}
.plan-row:hover .plan-acts{display:flex}
.plan-acts button{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;padding:1px 3px;border-radius:2px}
.plan-acts button:hover{color:var(--text);background:#1e293b}
.plan-pbar{height:3px;background:#0f172a;border-radius:2px;margin:2px 0 4px 22px;overflow:hidden}
.plan-pfill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:2px;transition:width .4s}
.plan-add-inline{display:flex;gap:5px;align-items:center;padding:2px 4px;margin:2px 0 2px 22px}
.plan-add-inline input{flex:1;background:#0f172a;border:1px solid #1e3a5f;border-radius:4px;padding:3px 8px;color:var(--text);font-size:11px;outline:none;font-family:inherit}

/* Task/Approval items */
.task-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;margin-bottom:3px;font-size:10px;background:var(--card);border-left:3px solid var(--dim)}
.task-item.done{border-left-color:var(--green);opacity:.6}
.task-item.progress{border-left-color:var(--yellow)}
.appr-card{background:var(--card);border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid var(--yellow)}
.appr-card button{border:none;border-radius:4px;padding:4px 12px;font-size:10px;cursor:pointer;font-weight:600}
.file-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid #1e293b;font-size:10px;cursor:pointer}
.file-item:hover{background:#1a2332}

/* Empty state */
.empty{display:none;text-align:center;padding:80px 20px;color:var(--dim);flex:1}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:400px}
.modal h2{font-size:16px;margin-bottom:12px}
.modal label{display:block;font-size:11px;color:var(--dim);margin:8px 0 4px}
.modal input,.modal select{width:100%;background:var(--card);border:1px solid #374151;border-radius:8px;padding:8px;color:var(--text);font-size:12px;outline:none;box-sizing:border-box}
.modal-acts{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.preset{background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 8px;font-size:10px;color:var(--dim);cursor:pointer}
.preset:hover{border-color:var(--accent);color:var(--text)}

/* Lang overlay */
.lang-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;align-items:center;justify-content:center}
/* Toast */
.toasts{position:fixed;bottom:60px;right:20px;z-index:500;display:flex;flex-direction:column;gap:6px}
.toast{background:#1e293b;color:var(--text);padding:8px 16px;border-radius:8px;font-size:11px;border-left:3px solid var(--accent);animation:bubbleIn .3s}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes bubbleIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
</style>
</head>
<body>

<!-- Language Setup -->
<div class="lang-overlay" id="lang-overlay">
  <div style="background:linear-gradient(145deg,#0f172a,#1e293b);border:1px solid #334155;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🌍</div>
    <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px">Welcome to AI Company Hub</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:20px">Type your language to set up the interface</div>
    <input id="lang-input" placeholder="e.g. Korean, English, 日本語..." style="width:100%;background:#0f172a;border:2px solid #334155;border-radius:10px;padding:12px;color:#f1f5f9;font-size:14px;text-align:center;outline:none;box-sizing:border-box" onkeydown="if(event.key==='Enter')genLang()">
    <div id="lang-status" style="font-size:11px;color:var(--dim);margin-top:10px;min-height:20px"></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
      <button onclick="genLang()" id="lang-btn" class="btn-primary" style="padding:10px 24px;font-size:13px">🚀 Set Up</button>
      <button onclick="skipLang()" style="background:transparent;color:var(--dim);border:1px solid #334155;border-radius:8px;padding:10px 16px;font-size:12px;cursor:pointer">Skip</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="hdr">
  <h1>🏢 <span>AI Company Hub</span></h1>
  <div class="tabs" id="tabs"></div>
  <span id="hdr-stats" class="hdr-stats"></span>
  <input id="search" placeholder="🔍" style="background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 6px;color:var(--text);font-size:10px;width:70px;outline:none" oninput="debounceSearch(this.value)" onfocus="this.style.width='150px'" onblur="if(!this.value)this.style.width='70px'">
  <div id="search-results" style="display:none;position:fixed;top:38px;right:60px;width:340px;background:#111827;border:1px solid #334155;border-radius:8px;z-index:150;max-height:350px;overflow-y:auto"></div>
  <button onclick="resetLang()" class="hdr-btn" title="언어">🌍</button>
  <button onclick="openAgent()" class="hdr-btn" title="에이전트 추가">🤖＋</button>
  <button onclick="openOutsource()" class="hdr-btn" title="아웃소싱">🔗</button>
  <button onclick="openCreate()" class="btn-primary">＋</button>
</div>

<!-- Approval Banner -->
<div class="banner" id="banner"></div>

<!-- Empty State -->
<div class="empty" id="empty">
  <div style="font-size:56px;margin-bottom:16px">🏢</div>
  <p style="font-size:16px;margin-bottom:8px">아직 회사가 없습니다</p>
  <p style="font-size:12px;margin-bottom:20px">AI 에이전트가 일하는 가상 회사를 만들어보세요</p>
  <button onclick="openCreate()" class="btn-primary" style="padding:12px 28px;font-size:14px">＋ 새 회사 만들기</button>
</div>

<!-- Agent Floor (main area) -->
<div class="floor" id="floor" style="display:none"></div>

<!-- Command Bar -->
<div class="cmd-bar" id="cmd-bar">
  <div class="cmd-chips" id="cmd-chips"></div>
  <input class="cmd-input" id="cmd-input" placeholder="@에이전트 지시사항 입력..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}">
  <button class="cmd-send" onclick="send()">⏎</button>
</div>

<!-- Side drawer toggle buttons -->
<div class="drawer-toggle" id="drawer-btns" style="display:none">
  <button onclick="toggleDrawer('tasks')" id="dt-tasks" title="작업">📋</button>
  <button onclick="toggleDrawer('approvals')" id="dt-approvals" title="결재" style="position:relative">🔔<span class="badge" id="apr-badge" style="display:none">0</span></button>
  <button onclick="toggleDrawer('plan')" id="dt-plan" title="계획">🗂️</button>
  <button onclick="toggleDrawer('files')" id="dt-files" title="자료">📂</button>
</div>

<!-- Side drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawer-title">작업</h3>
    <a href="#" onclick="event.preventDefault();dl()" style="font-size:9px;color:var(--accent);text-decoration:none" id="dl-link" style="display:none">📦 ZIP</a>
    <button onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- Create Company Modal -->
<div class="overlay" id="create-modal">
  <div class="modal">
    <h2>🏢 새 회사 만들기</h2>
    <label>회사명</label><input id="c-name" placeholder="예: O2O 마케팅 프로젝트">
    <label>주제 / 목표</label><input id="c-topic" placeholder="예: 온라인 비즈니스">
    <div class="modal-acts">
      <button onclick="$('create-modal').classList.remove('show')" style="background:transparent;border:1px solid #374151;color:var(--dim);border-radius:8px;padding:8px 16px;cursor:pointer">취소</button>
      <button onclick="createCo()" class="btn-primary" style="padding:8px 16px">생성</button>
    </div>
  </div>
</div>

<!-- Add Agent Modal -->
<div class="overlay" id="agent-modal">
  <div class="modal">
    <h2>🤖 에이전트 추가</h2>
    <label>빠른 선택</label>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
      <button class="preset" onclick="fp('COO','운영총괄','⚙️')">⚙️ COO</button>
      <button class="preset" onclick="fp('CFO','재무','💰')">💰 CFO</button>
      <button class="preset" onclick="fp('HR','인사','👥')">👥 HR</button>
      <button class="preset" onclick="fp('Designer','디자인','🎨')">🎨 Design</button>
      <button class="preset" onclick="fp('Developer','개발','👨‍💻')">👨‍💻 Dev</button>
      <button class="preset" onclick="fp('PM','프로젝트 관리','📋')">📋 PM</button>
    </div>
    <label>이름</label><input id="a-name" placeholder="예: SEO Manager">
    <label>역할</label><input id="a-role" placeholder="예: SEO 최적화">
    <input id="a-emoji" value="🤖" style="display:none">
    <label>상위 소속</label><select id="a-parent"><option value="">리더 직속</option></select>
    <label>AI 모델</label><select id="a-model"><option value="">기본</option></select>
    <div class="modal-acts">
      <button onclick="$('agent-modal').classList.remove('show')" style="background:transparent;border:1px solid #374151;color:var(--dim);border-radius:8px;padding:8px 16px;cursor:pointer">취소</button>
      <button onclick="addAgent()" class="btn-primary" style="padding:8px 16px">추가</button>
    </div>
  </div>
</div>

<!-- Outsource Modal -->
<div class="overlay" id="outsource-modal">
  <div class="modal">
    <h2>🔗 아웃소싱 의뢰</h2>
    <p style="font-size:10px;color:var(--dim);margin-bottom:8px">다른 회사의 에이전트에게 작업을 위임합니다</p>
    <label>대상 회사</label><select id="os-company"></select>
    <label>대상 에이전트 (비워두면 리더에게)</label><select id="os-agent"><option value="">리더 자동선택</option></select>
    <label>의뢰 내용</label>
    <textarea id="os-text" placeholder="예: 우리 홈페이지 디자인 시안 3종 제작해주세요" style="width:100%;background:var(--card);border:1px solid #374151;border-radius:8px;padding:8px;color:var(--text);font-size:12px;outline:none;box-sizing:border-box;min-height:80px;resize:vertical;font-family:inherit"></textarea>
    <div class="modal-acts">
      <button onclick="$('outsource-modal').classList.remove('show')" style="background:transparent;border:1px solid #374151;color:var(--dim);border-radius:8px;padding:8px 16px;cursor:pointer">취소</button>
      <button onclick="sendOutsource()" class="btn-primary" style="padding:8px 16px">🔗 의뢰 전송</button>
    </div>
  </div>
</div>

<script>
// ─── Utils ───
function $(id){return document.getElementById(id)}
function _e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ─── i18n ───
const UI={ko:{},en:{}};
let lang=localStorage.getItem('hub-lang')||'ko';
async function checkLang(){
  const o=$('lang-overlay');
  if(!localStorage.getItem('hub-lang')){o.style.display='flex';return}
  o.style.display='none';
  try{const r=await fetch(`/api/i18n/${lang}`);if(r.ok){UI[lang]=await r.json()}}catch(e){}
}
async function genLang(){
  const v=$('lang-input').value.trim();if(!v)return;
  const b=$('lang-btn'),s=$('lang-status');
  b.disabled=true;b.textContent='⏳...';s.textContent='Translating...';s.style.color='#60a5fa';
  try{const r=await fetch('/api/i18n/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:v})});const d=await r.json();
    if(d.ok){s.textContent='✅';localStorage.setItem('hub-lang',d.lang_code);lang=d.lang_code;setTimeout(()=>$('lang-overlay').style.display='none',500)}
    else{s.textContent='❌ '+d.error;s.style.color='#ef4444';b.disabled=false;b.textContent='🚀 Retry'}}
  catch(e){s.textContent='❌';b.disabled=false;b.textContent='🚀 Retry'}
}
function skipLang(){localStorage.setItem('hub-lang','en');lang='en';$('lang-overlay').style.display='none'}
function resetLang(){localStorage.removeItem('hub-lang');$('lang-overlay').style.display='flex'}

// ─── State ───
let cos=[],cur=null,lastLen=0,approvals=[],tasks=[],costs=null;
const thinking={};
// Per-agent speech log: { agentId: [{type,html,time},...] }
const agentLog={};

// ─── Core ───
async function load(){
  try{cos=(await(await fetch('/api/companies')).json())}catch(e){cos=[]}
  renderTabs();
  if(!cos.length){$('empty').style.display='block';$('floor').style.display='none';$('cmd-bar').classList.remove('show');$('drawer-btns').style.display='none'}
  else{$('empty').style.display='none';$('floor').style.display='flex';$('cmd-bar').classList.add('show');$('drawer-btns').style.display='';if(!cur||!cos.find(c=>c.id===cur))sel(cos[0].id);else refresh()}
}
function renderTabs(){$('tabs').innerHTML=cos.map(c=>`<div class="tab ${c.id===cur?'active':''}" onclick="sel('${c.id}')">${_e(c.name)}<span class="x" onclick="event.stopPropagation();delCo('${c.id}','${_e(c.name)}')">✕</span></div>`).join('')}
async function sel(id){cur=id;lastLen=0;Object.keys(agentLog).forEach(k=>delete agentLog[k]);renderTabs();await refresh()}

async function refresh(){
  if(!cur)return;
  const c=await(await fetch(`/api/company/${cur}`)).json();
  // Build agent chips
  $('cmd-chips').innerHTML=(c.agents||[]).map(a=>`<span class="cmd-chip" onclick="ins('${a.name}')">${a.emoji} @${a.name}</span>`).join('');
  // Populate agent logs from chat history
  (c.chat||[]).forEach(m=>{
    if(m.type==='agent'&&m.from){
      const ag=(c.agents||[]).find(a=>a.name===m.from);
      if(ag)pushSpeech(ag.id,m.text||'',m.from,ag.emoji||'🤖',m.time||'')
    }
  });
  lastLen=(c.chat||[]).length;
  renderFloor();extras();
}

function pushSpeech(aid,text,name,emoji,time){
  if(!agentLog[aid])agentLog[aid]=[];
  // Dedupe by text prefix
  const last=agentLog[aid][agentLog[aid].length-1];
  if(last&&last.raw===text)return;
  // Parse mentions/delegations
  const mentions=(text.match(/@(\w+)/g)||[]).map(t=>t.slice(1));
  const hasDelegate=mentions.length>0;
  agentLog[aid].push({raw:text,mentions,hasDelegate,time:time||now(),name,emoji});
  if(agentLog[aid].length>8)agentLog[aid].shift();
}
function now(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}

async function extras(){
  if(!cur)return;
  try{const[b,c,a]=await Promise.all([fetch(`/api/board-tasks/${cur}`),fetch(`/api/costs/${cur}`),fetch(`/api/approvals/${cur}?status=pending`)]);
    tasks=await b.json();costs=await c.json();approvals=await a.json();renderBanner();renderStats();updateAprBadge()}catch(e){}
}

// ─── Render Agent Floor ───
function renderFloor(){
  const el=$('floor');if(!el)return;
  const c=cos.find(x=>x.id===cur);
  if(!c||!c.agents){el.innerHTML='';return}
  el.innerHTML=c.agents.map(a=>{
    const aid=a.id;
    const isThinking=!!thinking[cur+':'+aid];
    const isWorking=a.status==='working';
    const cls=isThinking?'thinking':isWorking?'working':'';
    const dotCls=isThinking?'dot-thinking':a.status==='active'?'dot-active':'dot-idle';
    const myTasks=tasks.filter(t=>t.agent_id===aid&&t.status!=='완료');
    const taskBadge=myTasks.length?`<span class="card-task-badge" title="${_e(myTasks[0].title)}">${myTasks.length>1?myTasks.length+'건':'🔄 '+_e(myTasks[0].title).substring(0,20)}</span>`:'';
    const logs=agentLog[aid]||[];
    let speechHtml='';
    if(isThinking){
      speechHtml=`<div class="thinking-dots">생각 중...</div>`;
    }
    if(logs.length){
      // Show last 3 messages
      const recent=logs.slice(-3);
      speechHtml+=recent.map(l=>{
        if(l.hasDelegate){
          // Delegation message
          const targets=l.mentions.map(t=>`<span style="color:#60a5fa;font-weight:700">@${_e(t)}</span>`).join(' ');
          const body=fmtBubble(l.raw.replace(/@\w+\s*/g,'').trim().substring(0,150));
          return`<div class="delegation"><span style="font-weight:600">${l.emoji}</span><span class="arrow">→</span>${targets}<span style="flex:1;font-size:10px;color:#c4b5fd;margin-left:4px">${body}</span><span style="color:var(--dim);font-size:8px">${l.time}</span></div>`;
        }else{
          return`<div class="bubble"><span class="time">${l.time}</span>${fmtBubble(l.raw.substring(0,200))}</div>`;
        }
      }).join('');
    }
    if(!speechHtml)speechHtml=`<div class="speech-empty">대기 중</div>`;

    return`<div class="agent-card ${cls}" id="card-${aid}">
      <div class="card-head">
        <div class="card-avatar">${a.emoji||'🤖'}<div class="dot ${dotCls}"></div></div>
        <div><div class="card-name">${_e(a.name)}</div><div class="card-role">${_e(a.role||'')}</div></div>
        ${taskBadge}
      </div>
      <div class="card-speech" id="speech-${aid}">${speechHtml}</div>
      <div class="card-foot">
        <span class="cnt">${(agentLog[aid]||[]).length}건</span>
        <button onclick="expandCard('${aid}')" title="전체 보기">📋</button>
        <button onclick="directMsg('${a.name}')" title="직접 지시">💬</button>
      </div>
    </div>`;
  }).join('');
}

function fmtBubble(text){
  let h=_e(text);
  h=h.replace(/^## (.+)$/gm,'<div style="font-size:12px;font-weight:700;color:#f1f5f9;margin:4px 0 2px">$1</div>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/@(\w+)/g,'<span class="at">@$1</span>');
  h=h.replace(/^- (.+)$/gm,'<div style="padding-left:8px">• $1</div>');
  h=h.replace(/\n/g,'<br>');
  return h;
}

function expandCard(aid){
  const logs=agentLog[aid]||[];
  if(!logs.length){toast('아직 활동 없음');return}
  openDrawerWith('log','📋 '+aid.toUpperCase()+' 전체 로그',
    logs.map(l=>`<div style="padding:6px 0;border-bottom:1px solid #1e293b;font-size:11px;line-height:1.5">
      <div style="color:var(--dim);font-size:9px;margin-bottom:2px">${l.time}</div>
      ${fmtBubble(l.raw)}
    </div>`).join('')
  );
}

// ─── Side Drawer ───
let curDrawer=null;
function toggleDrawer(name){
  if(curDrawer===name){closeDrawer();return}
  curDrawer=name;
  document.querySelectorAll('.drawer-toggle button').forEach(b=>b.classList.remove('active'));
  const btn=$('dt-'+name);if(btn)btn.classList.add('active');
  const body=$('drawer-body'),title=$('drawer-title'),dl=$('dl-link');
  dl.style.display=name==='files'?'':'none';
  if(name==='tasks'){title.textContent='📋 작업';renderDrawerTasks(body)}
  else if(name==='approvals'){title.textContent='🔔 결재';renderDrawerApprovals(body)}
  else if(name==='plan'){title.textContent='🗂️ 계획 트리';fetchPlanTasks()}
  else if(name==='files'){title.textContent='📂 자료';renderDrawerFiles(body)}
  $('drawer').classList.add('open');
}
function openDrawerWith(name,titleText,html){
  curDrawer=name;
  $('drawer-title').textContent=titleText;
  $('drawer-body').innerHTML=html;
  $('dl-link').style.display='none';
  $('drawer').classList.add('open');
}

  }).catch(()=>{el.innerHTML='<div style="color:var(--dim);font-size:10px">로드 실패</div>'});

}

// ─── Plan Tree (in drawer) ───
let _planTasks=[],_planAddPar=null;
async function fetchPlanTasks(){
  if(!cur)return;
  try{const r=await fetch(`/api/plan-tasks/${cur}`);_planTasks=await r.json();renderPlanTree()}catch(e){}
}
function renderPlanTree(){
  const el=$('drawer-body');if(!el||curDrawer!=='plan')return;
  if(!_planTasks.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dim);font-size:10px">📋 에이전트가 작업하면 자동 생성됩니다<br><span style="font-size:9px;cursor:pointer;color:var(--accent)" onclick="planAddStart(null)">＋ 직접 추가</span></div>';return}
  const roots=_planTasks.filter(t=>!t.parent_id);
  const co=cos.find(c=>c.id===cur);
  let h='<div class="plan-tree"><div class="plan-root">';
  h+=_planAddInline(null);
  roots.forEach(t=>{h+=_planNode(t,co)});
  h+='</div></div>';
  el.innerHTML=h;
}
function _planAddInline(pid){
  const k=pid||'root';if(_planAddPar!==k)return'';
  const co=cos.find(c=>c.id===cur);
  const opts=(co?.agents||[]).map(a=>`<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('');
  return`<div class="plan-add-inline"><input id="pai-${k}" placeholder="작업 제목..." onkeydown="if(event.key==='Enter')planAddSubmit('${pid||''}');if(event.key==='Escape')planAddCancel()"><select id="paa-${k}" style="background:#0f172a;border:1px solid #1e3a5f;border-radius:4px;padding:2px 4px;color:var(--text);font-size:10px;max-width:80px"><option value="">담당</option>${opts}</select><button onclick="planAddSubmit('${pid||''}')" style="background:var(--accent);color:white;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer">↵</button><button onclick="planAddCancel()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px">✕</button></div>`;
}
function _planNode(t,co){
  const s=t.status||'todo';
  const chkCls=s==='done'?'done':s==='in-progress'?'progress':'';
  const chkIcon=s==='done'?'✓':s==='in-progress'?'↻':'';
  const lblCls=s==='done'?'done':s==='in-progress'?'progress':'';
  const kids=_planTasks.filter(c=>c.parent_id===t.id);
  const total=kids.length,done=kids.filter(c=>c.status==='done').length;
  const ag=(co?.agents||[]).find(a=>a.id===t.agent_id);
  const agTag=ag?`<span class="plan-agent">${ag.emoji||''} ${ag.name||t.agent_id}</span>`:(t.agent_id?`<span class="plan-agent">${t.agent_id}</span>`:'');
  let h=`<div class="plan-node" id="pn-${t.id}"><div class="plan-row" onclick="planCycle('${t.id}')"><div class="plan-chk ${chkCls}" title="상태 변경">${chkIcon}</div><span class="plan-label ${lblCls}">${_e(t.title)}</span>${agTag}<div class="plan-acts" onclick="event.stopPropagation()"><button onclick="planAddStart('${t.id}')" title="하위 추가">＋</button><button onclick="planDel('${t.id}')" title="삭제">✕</button></div></div>`;
  if(total>0)h+=`<div class="plan-pbar"><div class="plan-pfill" style="width:${Math.round(done/total*100)}%"></div></div>`;
  h+=_planAddInline(t.id);
  kids.forEach(c=>{h+=_planNode(c,co)});
  h+='</div>';return h;
}
function planAddStart(pid){_planAddPar=pid||'root';renderPlanTree();setTimeout(()=>{const el=document.getElementById('pai-'+(pid||'root'));if(el)el.focus()},50)}
function planAddCancel(){_planAddPar=null;renderPlanTree()}
async function planAddSubmit(pid){
  const k=pid||'root',inp=document.getElementById('pai-'+k),sel=document.getElementById('paa-'+k);
  const title=(inp?.value||'').trim();if(!title){planAddCancel();return}
  _planAddPar=null;
  try{const r=await fetch(`/api/plan-task-add/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,parent_id:pid||null,agent_id:sel?.value||'',status:'todo'})});
    const d=await r.json();if(d.ok){_planTasks.push(d.task);renderPlanTree()}else toast('추가 실패')}catch(e){toast('오류')}
}
async function planCycle(id){
  const t=_planTasks.find(x=>x.id===id);if(!t)return;
  const nxt={todo:'in-progress','in-progress':'done',done:'todo',blocked:'todo'};
  t.status=nxt[t.status]||'todo';renderPlanTree();
  try{await fetch(`/api/plan-task-update/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:t.status})})}catch(e){}
}
async function planDel(id){
  const t=_planTasks.find(x=>x.id===id);if(!t||!confirm(`"${t.title}" 삭제?`))return;
  try{const r=await fetch(`/api/plan-task-delete/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
    const d=await r.json();if(d.ok){const rm=new Set();const col=i=>{rm.add(i);_planTasks.filter(x=>x.parent_id===i).forEach(x=>col(x.id))};col(id);_planTasks=_planTasks.filter(x=>!rm.has(x.id));renderPlanTree()}else toast('삭제 실패')}catch(e){toast('오류')}
}

function openOutsource(){
  if(!cur){toast('회사를 먼저 선택하세요');return}
  if(cos.length<2){toast('아웃소싱할 다른 회사가 필요합니다. 회사를 추가하세요.');return}
  const sel=$('os-company');
  sel.innerHTML=cos.filter(c=>c.id!==cur).map(c=>`<option value="${c.id}">${_e(c.name)}</option>`).join('');
  sel.onchange=()=>{
    const tid=sel.value;const tc=cos.find(c=>c.id===tid);
    const as=$('os-agent');as.innerHTML='<option value="">리더 자동선택</option>';
    if(tc)(tc.agents||[]).forEach(a=>as.innerHTML+=`<option value="${a.id}">${a.emoji} ${a.name} (${a.role||''})</option>`);
  };
  sel.onchange();
  $('os-text').value='';
  $('outsource-modal').classList.add('show');
}
async function sendOutsource(){
  const to_cid=$('os-company').value;
  const to_agent=$('os-agent').value;
  const text=$('os-text').value.trim();
  if(!text){toast('의뢰 내용을 입력하세요');return}
  try{
    const r=await(await fetch('/api/cross-nudge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_cid:cur,to_cid,from_agent:'',to_agent,text})})).json();
    if(r.ok){toast(`🔗 ${r.to}에 의뢰 전송 완료`);$('outsource-modal').classList.remove('show')}
    else toast('실패: '+(r.error||''))
  }catch(e){toast('오류: '+e.message)}
}

// ─── Toast ───
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;let s=$('toasts');if(!s){s=document.createElement('div');s.id='toasts';s.className='toasts';document.body.appendChild(s)}s.appendChild(el);setTimeout(()=>el.remove(),3000)}

// ─── Search ───
let _st=null;
function debounceSearch(q){clearTimeout(_st);if(!q||q.length<2){$('search-results').style.display='none';return}_st=setTimeout(()=>doSearch(q),350)}
async function doSearch(q){
  const el=$('search-results');el.style.display='block';el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">검색 중...</div>';
  try{const r=await(await fetch(`/api/search?q=${encodeURIComponent(q)}`)).json();
    if(!r.length){el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">결과 없음</div>';return}
    el.innerHTML=r.slice(0,8).map(x=>`<div style="padding:6px 10px;border-bottom:1px solid #1e293b;cursor:pointer;font-size:10px" onclick="sel('${x.company_id}');$('search-results').style.display='none'"><span style="color:#60a5fa">${_e(x.from||'')}</span> ${_e((x.text||'').substring(0,60))}</div>`).join('')}
  catch(e){el.innerHTML='<div style="padding:8px;color:var(--red);font-size:10px">오류</div>'}
}
document.addEventListener('click',e=>{if(!e.target.closest('#search')&&!e.target.closest('#search-results'))$('search-results').style.display='none'});

// ─── SSE ───
let sseTimer=null;
function connectSSE(){
  if(sseTimer)clearTimeout(sseTimer);
  const es=new EventSource('/api/sse');
  es.addEventListener('init',e=>{try{cos=JSON.parse(e.data);renderTabs()}catch(e){}});
  es.addEventListener('agent_thinking',e=>{try{const d=JSON.parse(e.data);
    thinking[d.cid+':'+d.agent_id]={};
    if(d.cid===cur){
      // Update card to thinking state
      const card=$('card-'+d.agent_id);
      if(card){card.classList.add('thinking');card.classList.remove('working')}
      const sp=$('speech-'+d.agent_id);
      if(sp){const dot=sp.querySelector('.thinking-dots');if(!dot)sp.insertAdjacentHTML('beforeend','<div class="thinking-dots">생각 중...</div>')}
    }
  }catch(e){}});
  es.addEventListener('agent_done',e=>{try{const d=JSON.parse(e.data);
    delete thinking[d.cid+':'+d.agent_id];
    if(d.cid===cur){
      const card=$('card-'+d.agent_id);
      if(card){card.classList.remove('thinking','working')}
      // Refresh tasks & approvals
      extras();
      if(curDrawer==='tasks')renderDrawerTasks($('drawer-body'));
      if(curDrawer==='plan')fetchPlanTasks();
    }
  }catch(e){}});
  es.addEventListener('approval',e=>{try{if(cur)fetch(`/api/approvals/${cur}?status=pending`).then(r=>r.json()).then(d=>{approvals=d;renderBanner();updateAprBadge()}).catch(()=>{})}catch(e){}});
  es.addEventListener('company_update',e=>{try{const d=JSON.parse(e.data);
    if(d.deleted){cos=cos.filter(c=>c.id!==d.id);renderTabs();if(cur===d.id){cur=cos.length?cos[0].id:null;cur?refresh():load()}return}
    if(!d.company||!d.id)return;const i=cos.findIndex(c=>c.id===d.id);if(i>=0)cos[i]=d.company;else cos.push(d.company);renderTabs();
    if(d.id!==cur)return;
    const c=d.company,chat=c.chat||[];
    // Process new messages
    chat.slice(lastLen).forEach(m=>{
      if(m.type==='agent'&&m.from){
        const ag=(c.agents||[]).find(a=>a.name===m.from);
        if(ag)pushSpeech(ag.id,m.text||'',m.from,ag.emoji||'🤖',m.time||'')
      }
    });
    lastLen=chat.length;
    renderFloor();
  }catch(e){}});
  es.onerror=()=>{es.close();sseTimer=setTimeout(connectSSE,3000)};
}

// ─── Init ───
document.addEventListener('DOMContentLoaded',checkLang);
load();connectSSE();
</script>
