<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Company Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--panel:#111827;--card:#1e293b;--border:#1e3a5f;--text:#e0e0e0;--dim:#64748b;--accent:#3b82f6;--green:#00ff88;--yellow:#fbbf24;--red:#ef4444}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:5px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr h1{font-size:14px;white-space:nowrap}.hdr h1 span{color:#7b68ee}
.tabs{display:flex;gap:4px;flex:1;overflow-x:auto;margin:0 8px}
.tab{background:var(--card);border:1px solid transparent;border-radius:6px;padding:4px 10px;font-size:11px;color:var(--dim);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:#1e3a5f;border-color:var(--accent);color:white}
.tab .x{margin-left:4px;cursor:pointer;color:var(--dim);font-size:9px}
.hdr-stats{font-size:9px;color:var(--dim)}
.hdr-btn{background:var(--card);border:1px solid #374151;border-radius:4px;padding:2px 6px;font-size:9px;color:var(--dim);cursor:pointer;text-decoration:none}
.hdr-btn:hover{border-color:var(--accent);color:var(--text)}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}

/* Main layout: icon grid (left) + status panel (right) */
.dashboard{flex:1;display:flex;overflow:hidden;min-height:0}
.dash-left{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.dash-right{width:320px;flex-shrink:0;border-left:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.dash-right.collapsed{width:0;border-left:none}

/* Agent icon grid */
.icon-grid{display:flex;flex-wrap:wrap;gap:16px;padding:20px;align-content:flex-start;justify-content:center}
.agent-icon{position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .15s}
.agent-icon:hover{transform:translateY(-2px)}
.agent-icon.selected .ai-circle{border-color:var(--accent);box-shadow:0 0 12px rgba(59,130,246,.4)}
.ai-circle{width:52px;height:52px;border-radius:50%;border:2.5px solid #334155;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--card);transition:all .2s;position:relative}
/* Status ring colors */
.agent-icon.s-working .ai-circle{border-color:#3b82f6;box-shadow:0 0 8px rgba(59,130,246,.3);animation:ringPulse 2s ease-in-out infinite}
.agent-icon.s-thinking .ai-circle{border-color:#fbbf24;box-shadow:0 0 10px rgba(251,191,36,.4);animation:ringPulse 1.2s ease-in-out infinite}
.agent-icon.s-active .ai-circle{border-color:#00ff88;box-shadow:0 0 6px rgba(0,255,136,.2)}
.agent-icon.s-idle .ai-circle{border-color:#334155;opacity:.45}
.agent-icon.s-registering .ai-circle{border-color:#a78bfa;border-style:dashed;animation:ringSpin 3s linear infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 4px currentColor}50%{box-shadow:0 0 16px currentColor}}
@keyframes ringSpin{to{transform:rotate(360deg)}}
/* Status dot */
.ai-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--card)}
.s-working .ai-dot{background:#3b82f6}
.s-thinking .ai-dot{background:#fbbf24;animation:dotBlink .8s infinite}
.s-active .ai-dot{background:#00ff88}
.s-idle .ai-dot{background:#475569}
.s-registering .ai-dot{background:#a78bfa;animation:dotBlink 1s infinite}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.3}}
/* Name label */
.ai-name{font-size:9px;color:var(--dim);text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-icon.selected .ai-name{color:var(--text);font-weight:600}
/* Connection lines between agents (subtle) */
.ai-link{font-size:7px;color:var(--dim);position:absolute;top:-8px;right:-4px;opacity:0}
.agent-icon.s-working .ai-link,.agent-icon.s-thinking .ai-link{opacity:1}

/* Status Panel (right side — character sheet) */
.status-panel{flex:1;overflow-y:auto;padding:16px}
.sp-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:11px;text-align:center;padding:20px}
.sp-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sp-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--card);flex-shrink:0}
.sp-name{font-size:16px;font-weight:700;color:#f1f5f9}
.sp-role{font-size:11px;color:var(--dim)}
.sp-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-top:4px}
.sp-badge .dot{width:6px;height:6px;border-radius:50%}
.sb-working{background:rgba(59,130,246,.15);color:#60a5fa}.sb-working .dot{background:#3b82f6}
.sb-thinking{background:rgba(251,191,36,.15);color:#fbbf24}.sb-thinking .dot{background:#fbbf24}
.sb-active{background:rgba(0,255,136,.1);color:#00ff88}.sb-active .dot{background:#00ff88}
.sb-idle{background:rgba(100,116,139,.15);color:#64748b}.sb-idle .dot{background:#64748b}
.sb-registering{background:rgba(139,92,246,.15);color:#a78bfa}.sb-registering .dot{background:#a78bfa}

/* Status sections */
.sp-section{margin-bottom:14px}
.sp-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.sp-task{background:var(--card);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--text);border-left:3px solid var(--accent)}
.sp-task.done{border-left-color:var(--green);opacity:.7}
.sp-task-title{font-weight:600;margin-bottom:2px}
.sp-task-status{font-size:9px;color:var(--dim)}
.sp-no-task{font-size:10px;color:var(--dim);padding:6px 0}
.sp-activity{font-size:10px;line-height:1.6;color:#94a3b8;background:var(--card);border-radius:6px;padding:8px 10px;max-height:120px;overflow-y:auto;white-space:pre-wrap}
.sp-act-time{font-size:8px;color:var(--dim)}
.sp-msg-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px}
.sp-msg-btn:hover{background:#2563eb}

/* Task overview (below icon grid) */
.task-area{flex:1;overflow-y:auto;border-top:1px solid var(--border);padding:12px 16px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.section-title{font-size:11px;font-weight:700;color:var(--dim);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px}
.section-count{font-size:9px;color:var(--dim);background:var(--card);padding:1px 6px;border-radius:8px}
.task-list{display:flex;flex-direction:column;gap:4px}
.task-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;background:var(--card);font-size:11px;cursor:pointer;transition:background .1s}
.task-row:hover{background:#253349}
.task-row .tr-icon{font-size:12px;flex-shrink:0}
.task-row .tr-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.task-row .tr-agent{font-size:10px;color:var(--dim);flex-shrink:0}
.task-row .tr-status{font-size:9px;padding:1px 6px;border-radius:6px;flex-shrink:0}
.task-row.tr-done{opacity:.5}
.task-row.tr-done .tr-title{text-decoration:line-through}

/* Command Bar */
.bottom-bar{flex-shrink:0;display:flex;flex-direction:column;background:var(--panel);border-top:1px solid var(--border)}
.cmd-bar{padding:6px 12px;display:flex;flex-direction:column;gap:4px}
.cmd-normal{display:flex;gap:8px;align-items:center}
.cmd-approval{display:flex;gap:6px;align-items:center;background:#1a1500;border:1px solid #332200;border-radius:10px;padding:4px 8px}
.apr-info{flex:1;font-size:11px;color:#fbbf24;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.apr-info .apr-from{font-size:9px;color:#92400e;font-weight:400;margin-left:4px}
.apr-comment{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;min-width:80px}
.apr-comment:focus{border-color:#fbbf24}
.apr-comment::placeholder{color:#475569}
.apr-btn{border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap}
.apr-yes{background:#064e3b;color:#6ee7b7}.apr-yes:hover{background:#065f46}
.apr-no{background:#7f1d1d;color:#fca5a5}.apr-no:hover{background:#991b1b}
.apr-nav{background:none;border:none;color:#92400e;cursor:pointer;font-size:12px;padding:2px 4px;flex-shrink:0}
.apr-nav:hover{color:#fbbf24}
.apr-skip{background:none;border:none;color:#475569;cursor:pointer;font-size:11px;padding:2px 4px;flex-shrink:0}
.apr-skip:hover{color:var(--text)}
.cmd-input{flex:1;background:var(--card);border:1px solid #374151;border-radius:10px;padding:8px 14px;color:var(--text);font-size:13px;outline:none}
.cmd-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.cmd-input::placeholder{color:#475569}
.cmd-send{background:var(--accent);color:white;border:none;border-radius:10px;padding:8px 18px;cursor:pointer;font-size:12px;font-weight:600}
.cmd-send:active{transform:scale(.95)}

/* Side drawer */
.drawer-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:2px}
.drawer-toggle button{background:var(--panel);border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;padding:8px 4px;cursor:pointer;font-size:12px;color:var(--dim);width:28px;transition:all .15s}
.drawer-toggle button:hover{color:var(--text);background:#1e293b}
.drawer-toggle button.active{color:white;background:var(--accent);border-color:var(--accent)}
.drawer-toggle .badge{position:absolute;top:-2px;right:2px;background:var(--red);color:white;font-size:7px;border-radius:50%;width:12px;height:12px;display:flex;align-items:center;justify-content:center}
.drawer{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--panel);border-left:1px solid var(--border);z-index:40;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.drawer-head h3{font-size:12px;flex:1}
.drawer-head button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.drawer-body{flex:1;overflow-y:auto;padding:8px}

/* Plan Tree */
.plan-tree{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:11px;line-height:1.5}
.plan-node{position:relative;padding-left:20px}
.plan-node::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:#1e3a5f}
.plan-node:last-child::before{height:12px}
.plan-node::after{content:'';position:absolute;left:7px;top:12px;width:10px;height:1px;background:#1e3a5f}
.plan-root>.plan-node::before,.plan-root>.plan-node::after{display:none}
.plan-root>.plan-node{padding-left:0}
.plan-row{display:flex;align-items:center;gap:6px;padding:2px 4px;border-radius:4px;cursor:pointer;transition:background .1s}
.plan-row:hover{background:rgba(59,130,246,.08)}
.plan-chk{width:16px;height:16px;border:2px solid #334155;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:10px}
.plan-chk.done{background:#064e3b;border-color:#22c55e;color:#4ade80}
.plan-chk.progress{background:#1c1917;border-color:#fbbf24;color:#fbbf24}
.plan-chk:hover{border-color:var(--accent)}
.plan-label{flex:1;color:#e2e8f0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-label.done{color:#64748b;text-decoration:line-through}
.plan-label.progress{color:#fbbf24}
.plan-agent{font-size:9px;color:#475569;background:#0f172a;padding:1px 5px;border-radius:3px;flex-shrink:0}
.plan-acts{display:none;gap:2px;flex-shrink:0}
.plan-row:hover .plan-acts{display:flex}
.plan-acts button{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;padding:1px 3px;border-radius:2px}
.plan-acts button:hover{color:var(--text);background:#1e293b}
.plan-pbar{height:3px;background:#0f172a;border-radius:2px;margin:2px 0 4px 22px;overflow:hidden}
.plan-pfill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:2px;transition:width .4s}
.plan-add-inline{display:flex;gap:5px;align-items:center;padding:2px 4px;margin:2px 0 2px 22px}
.plan-add-inline input{flex:1;background:#0f172a;border:1px solid #1e3a5f;border-radius:4px;padding:3px 8px;color:var(--text);font-size:11px;outline:none;font-family:inherit}

/* Drawer items */
.task-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;margin-bottom:3px;font-size:10px;background:var(--card);border-left:3px solid var(--dim)}
.task-item.done{border-left-color:var(--green);opacity:.6}
.task-item.progress{border-left-color:var(--yellow)}
.appr-card{background:var(--card);border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid var(--yellow)}
.appr-card button{border:none;border-radius:4px;padding:4px 12px;font-size:10px;cursor:pointer;font-weight:600}
.file-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid #1e293b;font-size:10px;cursor:pointer}
.file-item:hover{background:#1a2332}

/* Detail popup */
.detail-popup{position:fixed;z-index:200;background:#111827;border:1px solid var(--border);border-radius:12px;
  padding:16px;width:360px;max-height:400px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6);
  top:50%;left:50%;transform:translate(-50%,-50%)}
.detail-popup h4{font-size:13px;color:#f1f5f9;margin-bottom:8px}
.detail-popup .dp-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.detail-popup .dp-content{font-size:11px;color:var(--text);line-height:1.6;white-space:pre-wrap}

/* Empty state */
.empty{display:none;text-align:center;padding:80px 20px;color:var(--dim);flex:1}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:400px}
.modal h2{font-size:16px;margin-bottom:12px}
.modal label{display:block;font-size:11px;color:var(--dim);margin:8px 0 4px}
.modal input,.modal select{width:100%;background:var(--card);border:1px solid #374151;border-radius:8px;padding:8px;color:var(--text);font-size:12px;outline:none;box-sizing:border-box}
.modal-acts{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.preset{background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 8px;font-size:10px;color:var(--dim);cursor:pointer}
.preset:hover{border-color:var(--accent);color:var(--text)}

/* Lang overlay */
.lang-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;align-items:center;justify-content:center}
/* Toast */
.toasts{position:fixed;bottom:60px;right:20px;z-index:500;display:flex;flex-direction:column;gap:6px}
.toast{background:#1e293b;color:var(--text);padding:8px 16px;border-radius:8px;font-size:11px;border-left:3px solid var(--accent)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
</style>
</head>
<body>

<!-- Language Setup -->
<div class="lang-overlay" id="lang-overlay">
  <div style="background:linear-gradient(145deg,#0f172a,#1e293b);border:1px solid #334155;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🌍</div>
    <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px">Welcome to AI Company Hub</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:20px">Type your language to set up the interface</div>
    <input id="lang-input" placeholder="e.g. Korean, English, 日本語..." style="width:100%;background:#0f172a;border:2px solid #334155;border-radius:10px;padding:12px;color:#f1f5f9;font-size:14px;text-align:center;outline:none;box-sizing:border-box" onkeydown="if(event.key==='Enter')genLang()">
    <div id="lang-status" style="font-size:11px;color:var(--dim);margin-top:10px;min-height:20px"></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
      <button onclick="genLang()" id="lang-btn" class="btn-primary" style="padding:10px 24px;font-size:13px">🚀 Set Up</button>
      <button onclick="skipLang()" style="background:transparent;color:var(--dim);border:1px solid #334155;border-radius:8px;padding:10px 16px;font-size:12px;cursor:pointer">Skip</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="hdr">
  <h1>🏢 <span>AI Company Hub</span></h1>
  <div class="tabs" id="tabs"></div>
  <span id="hdr-stats" class="hdr-stats"></span>
  <input id="search" placeholder="🔍" style="background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 6px;color:var(--text);font-size:10px;width:70px;outline:none" oninput="debounceSearch(this.value)" onfocus="this.style.width='150px'" onblur="if(!this.value)this.style.width='70px'">
  <div id="search-results" style="display:none;position:fixed;top:38px;right:60px;width:340px;background:#111827;border:1px solid #334155;border-radius:8px;z-index:150;max-height:350px;overflow-y:auto"></div>
  <button onclick="toggleNotif()" class="hdr-btn" id="notif-toggle" title="알림">🔔</button>
  <button onclick="resetLang()" class="hdr-btn" title="언어">🌍</button>
  <button onclick="openAgent()" class="hdr-btn" title="에이전트 추가">🤖＋</button>
  <button onclick="openOutsource()" class="hdr-btn" title="아웃소싱">🔗</button>
  <button onclick="openCreate()" class="btn-primary">＋</button>
</div>

<!-- Empty State -->
<div class="empty" id="empty">
  <div style="font-size:56px;margin-bottom:16px">🏢</div>
  <p style="font-size:16px;margin-bottom:8px">아직 회사가 없습니다</p>
  <p style="font-size:12px;margin-bottom:20px">AI 에이전트가 일하는 가상 회사를 만들어보세요</p>
  <button onclick="openCreate()" class="btn-primary" style="padding:12px 28px;font-size:14px">＋ 새 회사 만들기</button>
</div>

<!-- Main Dashboard -->
<div class="dashboard" id="dashboard" style="display:none">
  <!-- Left: icons + tasks -->
  <div class="dash-left">
    <div class="icon-grid" id="icon-grid"></div>
    <div class="task-area" id="task-area">
      <div class="section-head">
        <span class="section-title">작업 현황 <span class="section-count" id="task-count">0</span></span>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>
  </div>
  <!-- Right: character status panel -->
  <div class="dash-right" id="dash-right">
    <div class="status-panel" id="status-panel">
      <div class="sp-empty">에이전트를 클릭하여<br>상태를 확인하세요</div>
    </div>
  </div>
</div>

<!-- Bottom: command bar -->
<div class="bottom-bar" id="bottom-bar" style="display:none">
  <div class="cmd-bar" id="cmd-bar">
    <div class="cmd-normal" id="cmd-normal">
      <input class="cmd-input" id="cmd-input" placeholder="@에이전트 지시사항 입력..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}">
      <button class="cmd-send" id="cmd-send-btn" onclick="send()">⏎</button>
    </div>
    <div class="cmd-approval" id="cmd-approval" style="display:none">
      <button class="apr-nav" onclick="aprNav(-1)" title="이전">◀</button>
      <span class="apr-info" id="apr-info"></span>
      <input class="apr-comment" id="apr-comment" placeholder="코멘트 (선택)" onkeydown="if(event.key==='Enter'){event.preventDefault();aprResolve('approved')}">
      <button class="apr-btn apr-yes" onclick="aprResolve('approved')">✅ 승인</button>
      <button class="apr-btn apr-no" onclick="aprResolve('rejected')">❌ 반려</button>
      <button class="apr-nav" onclick="aprNav(1)" title="다음">▶</button>
      <button class="apr-skip" onclick="aprSkip()" title="나중에">✕</button>
    </div>
  </div>
</div>

<!-- Side drawer toggle buttons -->
<div class="drawer-toggle" id="drawer-btns" style="display:none">

  <button onclick="toggleDrawer('files')" id="dt-files" title="자료">📂</button>
</div>

<!-- Side drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawer-title">작업</h3>
    <a href="#" onclick="event.preventDefault();dl()" style="font-size:9px;color:var(--accent);text-decoration:none" id="dl-link" style="display:none">📦 ZIP</a>

    <label>주제 / 목표</label><input id="c-topic" placeholder="예: 온라인 비즈니스">
    <div class="modal-acts">
      <button onclick="$('create-modal').classList.remove('show')" style="background:transparent;border:1px solid #374151;color:var(--dim);border-radius:8px;padding:8px 16px;cursor:pointer">취소</button>
      <button onclick="createCo()" class="btn-primary" style="padding:8px 16px">생성</button>

<div class="overlay" id="agent-modal">
  <div class="modal">

      <button class="preset" onclick="fp('HR','인사','👥')">👥 HR</button>
      <button class="preset" onclick="fp('Designer','디자인','🎨')">🎨 Design</button>
      <button class="preset" onclick="fp('Developer','개발','👨‍💻')">👨‍💻 Dev</button>
      <button class="preset" onclick="fp('PM','프로젝트 관리','📋')">📋 PM</button>

    <label>이름</label><input id="a-name" placeholder="예: SEO Manager">
    <label>역할</label><input id="a-role" placeholder="예: SEO 최적화">

    <div class="modal-acts">

      <button onclick="addAgent()" class="btn-primary" style="padding:8px 16px">추가</button>

<!-- Outsource Modal -->
<div class="overlay" id="outsource-modal">
  <div class="modal">
    <h2>🔗 아웃소싱 의뢰</h2>
    <p style="font-size:10px;color:var(--dim);margin-bottom:8px">다른 회사의 에이전트에게 작업을 위임합니다</p>
    <label>대상 회사</label><select id="os-company"></select>
    <label>대상 에이전트 (비워두면 리더에게)</label><select id="os-agent"><option value="">리더 자동선택</option></select>

    <textarea id="os-text" placeholder="예: 우리 홈페이지 디자인 시안 3종 제작해주세요" style="width:100%;background:var(--card);border:1px solid #374151;border-radius:8px;padding:8px;color:var(--text);font-size:12px;outline:none;box-sizing:border-box;min-height:80px;resize:vertical;font-family:inherit"></textarea>
    <div class="modal-acts">
      <button onclick="$('outsource-modal').classList.remove('show')" style="background:transparent;border:1px solid #374151;color:var(--dim);border-radius:8px;padding:8px 16px;cursor:pointer">취소</button>
      <button onclick="sendOutsource()" class="btn-primary" style="padding:8px 16px">🔗 의뢰 전송</button>
    </div>
  </div>
</div>

<script>
// ─── Utils ───
function $(id){return document.getElementById(id)}
function _e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ─── i18n ───
const UI={ko:{},en:{}};
let lang=localStorage.getItem('hub-lang')||'ko';
async function checkLang(){
  const o=$('lang-overlay');
  if(!localStorage.getItem('hub-lang')){o.style.display='flex';return}
  o.style.display='none';
  try{const r=await fetch(`/api/i18n/${lang}`);if(r.ok){UI[lang]=await r.json()}}catch(e){}
}
async function genLang(){
  const v=$('lang-input').value.trim();if(!v)return;
  const b=$('lang-btn'),s=$('lang-status');
  b.disabled=true;b.textContent='⏳...';s.textContent='Translating...';s.style.color='#60a5fa';
  try{const r=await fetch('/api/i18n/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:v})});const d=await r.json();
    if(d.ok){s.textContent='✅';localStorage.setItem('hub-lang',d.lang_code);lang=d.lang_code;setTimeout(()=>$('lang-overlay').style.display='none',500)}
    else{s.textContent='❌ '+d.error;s.style.color='#ef4444';b.disabled=false;b.textContent='🚀 Retry'}}
  catch(e){s.textContent='❌';b.disabled=false;b.textContent='🚀 Retry'}
}
function skipLang(){localStorage.setItem('hub-lang','en');lang='en';$('lang-overlay').style.display='none'}
function resetLang(){localStorage.removeItem('hub-lang');$('lang-overlay').style.display='flex'}

// ─── Browser Notifications ───
let notifEnabled=localStorage.getItem('hub-notif')!=='off';
function initNotif(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'&&notifEnabled)Notification.requestPermission();
  updateNotifBtn();
}
function toggleNotif(){
  notifEnabled=!notifEnabled;
  localStorage.setItem('hub-notif',notifEnabled?'on':'off');
  if(notifEnabled&&'Notification' in window&&Notification.permission==='default')Notification.requestPermission();
  updateNotifBtn();
}
function updateNotifBtn(){
  const b=$('notif-toggle');if(!b)return;
  b.style.opacity=notifEnabled?'1':'0.4';
  b.title=notifEnabled?'알림 켜짐':'알림 꺼짐';
}
function notify(title,body){
  if(!notifEnabled||!document.hidden)return;
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  try{const n=new Notification(title,{body,icon:'🏢'});n.onclick=()=>{window.focus();n.close()};setTimeout(()=>n.close(),5000)}catch(e){}
}

// ─── State ───
let cos=[],cur=null,lastLen=0,approvals=[],tasks=[],costs=null;
let selectedAgent=null; // currently selected agent ID for status panel
const thinking={};
const agentLog={};

// ─── Core ───
async function load(){
  try{cos=(await(await fetch('/api/companies')).json())}catch(e){cos=[]}
  renderTabs();
  if(!cos.length){$('empty').style.display='block';$('dashboard').style.display='none';$('bottom-bar').style.display='none';$('drawer-btns').style.display='none'}
  else{$('empty').style.display='none';$('dashboard').style.display='flex';$('bottom-bar').style.display='flex';$('drawer-btns').style.display='';if(!cur||!cos.find(c=>c.id===cur))sel(cos[0].id);else refresh()}
}
function renderTabs(){$('tabs').innerHTML=cos.map(c=>`<div class="tab ${c.id===cur?'active':''}" onclick="sel('${c.id}')">${_e(c.name)}<span class="x" onclick="event.stopPropagation();delCo('${c.id}','${_e(c.name)}')">✕</span></div>`).join('')}
async function sel(id){cur=id;lastLen=0;selectedAgent=null;Object.keys(agentLog).forEach(k=>delete agentLog[k]);renderTabs();await refresh()}

async function refresh(){
  if(!cur)return;
  const c=await(await fetch(`/api/company/${cur}`)).json();
  (c.chat||[]).forEach(m=>{
    if(m.type==='agent'&&m.from){
      const ag=(c.agents||[]).find(a=>a.name===m.from);
      if(ag)pushSpeech(ag.id,m.text||'',m.from,ag.emoji||'🤖',m.time||'')
    }
  });
  lastLen=(c.chat||[]).length;
  renderIconGrid();renderStatusPanel();extras();
}

function pushSpeech(aid,text,name,emoji,time){
  if(!agentLog[aid])agentLog[aid]=[];
  const last=agentLog[aid][agentLog[aid].length-1];
  if(last&&last.raw===text)return;
  const mentions=(text.match(/@(\w+)/g)||[]).map(t=>t.slice(1));
  agentLog[aid].push({raw:text,mentions,time:time||now(),name,emoji});
  if(agentLog[aid].length>10)agentLog[aid].shift();
}
function now(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}

async function extras(){
  if(!cur)return;
  try{const[b,c,a]=await Promise.all([fetch(`/api/board-tasks/${cur}`),fetch(`/api/costs/${cur}`),fetch(`/api/approvals/${cur}?status=pending`)]);
    tasks=await b.json();costs=await c.json();approvals=await a.json();
    renderBanner();renderStats();updateAprBadge();renderTaskList();renderStatusPanel()}catch(e){}
}

// ─── Agent Icon Grid ───
function getAgentStatus(a){
  const aid=a.id;
  const isThinking=!!thinking[cur+':'+aid];
  if(isThinking)return'thinking';
  if(a.status==='working')return'working';
  if(a.status==='registering')return'registering';
  if(a.status==='active')return'active';
  return'idle';
}

function renderIconGrid(){
  const el=$('icon-grid');if(!el)return;
  const c=cos.find(x=>x.id===cur);
  if(!c||!c.agents){el.innerHTML='<div style="color:var(--dim);font-size:11px;padding:20px">에이전트 없음</div>';return}
  el.innerHTML=c.agents.map(a=>{
    const st=getAgentStatus(a);
    const sel=selectedAgent===a.id?'selected':'';
    return`<div class="agent-icon s-${st} ${sel}" onclick="selectAgent('${a.id}')">
      <div class="ai-circle">${a.emoji||'🤖'}<span class="ai-dot"></span></div>
      <span class="ai-name">${_e(a.name)}</span>
    </div>`;
  }).join('');
}

function selectAgent(aid){
  selectedAgent=selectedAgent===aid?null:aid;
  renderIconGrid();
  renderStatusPanel();
  // Auto-fill command bar
  if(selectedAgent){
    const c=cos.find(x=>x.id===cur);
    const a=c?(c.agents||[]).find(x=>x.id===aid):null;
    if(a){const inp=$('cmd-input');if(inp&&!inp.value)inp.value='@'+a.name+' ';inp.focus()}
  }
}

// ─── Status Panel (Character Sheet) ───
function renderStatusPanel(){
  const panel=$('status-panel');if(!panel)return;
  if(!selectedAgent){
    panel.innerHTML='<div class="sp-empty">에이전트를 클릭하여<br>상태를 확인하세요</div>';
    return;
  }
  const c=cos.find(x=>x.id===cur);
  const a=c?(c.agents||[]).find(x=>x.id===selectedAgent):null;
  if(!a){panel.innerHTML='<div class="sp-empty">에이전트를 찾을 수 없습니다</div>';return}

  const st=getAgentStatus(a);
  const stLabel={thinking:'생각중',working:'작업중',active:'대기',idle:'비활성',registering:'등록중'}[st]||'알수없음';
  const stCls={thinking:'sb-thinking',working:'sb-working',active:'sb-active',idle:'sb-idle',registering:'sb-registering'}[st]||'sb-idle';

  // Agent tasks
  const agentTasks=(tasks||[]).filter(t=>t.agent_id===a.id);
  const activeTasks=agentTasks.filter(t=>t.status==='진행중');
  const doneTasks=agentTasks.filter(t=>t.status==='완료');

  // Activity log
  const logs=agentLog[a.id]||[];
  const recentLogs=logs.slice(-5).reverse();

  let h=`
    <div class="sp-header">
      <div class="sp-avatar">${a.emoji||'🤖'}</div>
      <div>
        <div class="sp-name">${_e(a.name)}</div>
        <div class="sp-role">${_e(a.role||'')}</div>
        <span class="sp-badge ${stCls}"><span class="dot"></span>${stLabel}</span>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-label">현재 작업</div>
      ${activeTasks.length?activeTasks.map(t=>`
        <div class="sp-task"><div class="sp-task-title">🔄 ${_e(t.title)}</div><div class="sp-task-status">${_e(t.status)}</div></div>
      `).join(''):'<div class="sp-no-task">진행 중인 작업 없음</div>'}
    </div>

    <div class="sp-section">
      <div class="sp-label">완료한 작업 <span style="color:var(--green)">${doneTasks.length}</span></div>
      ${doneTasks.slice(-3).reverse().map(t=>`
        <div class="sp-task done" style="margin-bottom:4px;cursor:pointer" onclick="showTaskDetail('${t.id}')"><div class="sp-task-title">✅ ${_e(t.title)}</div></div>
      `).join('')||'<div class="sp-no-task">아직 없음</div>'}
    </div>

    <div class="sp-section">
      <div class="sp-label">최근 활동</div>
      ${recentLogs.length?recentLogs.map(l=>`
        <div style="margin-bottom:6px">
          <div class="sp-act-time">${l.time}</div>
          <div class="sp-activity">${_e(l.raw.replace(/\n/g,' ').substring(0,150))}</div>
        </div>
      `).join(''):'<div class="sp-no-task">아직 활동 없음</div>'}
    </div>

    <button class="sp-msg-btn" onclick="directMsg('${a.name}')">💬 ${_e(a.name)}에게 지시</button>
  `;
  panel.innerHTML=h;
}

// ─── Task List ───
function renderTaskList(){
  const el=$('task-list');if(!el)return;
  $('task-count').textContent=(tasks||[]).length;
  if(!tasks||!tasks.length){el.innerHTML='<div style="color:var(--dim);font-size:10px;padding:8px">작업 없음</div>';return}
  const c=cos.find(x=>x.id===cur);
  const agentMap={};
  (c?.agents||[]).forEach(a=>{agentMap[a.id]=a});
  const order={'진행중':0,'대기':1,'완료':2};
  const sorted=[...tasks].sort((a,b)=>(order[a.status]??1)-(order[b.status]??1));
  el.innerHTML=sorted.map(t=>{
    const icon=t.status==='완료'?'✅':t.status==='진행중'?'🔄':'⬜';
    const cls=t.status==='완료'?'tr-done':'';
    const agent=agentMap[t.agent_id];
    const agentLabel=agent?`${agent.emoji||''} ${agent.name}`:'';
    const blocked=(approvals||[]).some(a=>a.status==='pending'&&(a.task_id===t.id||a.title===t.title));
    const stColor=blocked?'background:#7f1d1d;color:#fca5a5':t.status==='진행중'?'background:rgba(59,130,246,.2);color:#60a5fa':t.status==='완료'?'background:rgba(0,255,136,.1);color:#00ff88':'background:var(--card);color:var(--dim)';
    return`<div class="task-row ${cls}" onclick="showTaskDetail('${t.id}')">
      <span class="tr-icon">${blocked?'⚠️':icon}</span>
      <span class="tr-title">${_e(t.title)}</span>
      <span class="tr-agent">${_e(agentLabel)}</span>
      <span class="tr-status" style="${stColor}">${blocked?'차단':_e(t.status||'대기')}</span>
    </div>`;
  }).join('');
}

function showTaskDetail(taskId){
  document.querySelectorAll('.detail-popup').forEach(el=>el.remove());
  const t=(tasks||[]).find(x=>x.id===taskId);if(!t)return;
  const agent=t.agent_id?((cos.find(x=>x.id===cur)?.agents||[]).find(a=>a.id===t.agent_id)):null;
  const popup=document.createElement('div');
  popup.className='detail-popup';
  popup.innerHTML=`
    <button class="dp-close" onclick="this.parentElement.remove()">✕</button>
    <h4>${t.status==='완료'?'✅':'🔄'} ${_e(t.title)}</h4>
    ${agent?`<div style="font-size:10px;color:#a5b4fc;margin-bottom:6px">${agent.emoji||'🤖'} ${_e(agent.name)} · ${_e(agent.role||'')}</div>`:''}
    <div style="display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:600;margin-bottom:8px;${t.status==='완료'?'background:#064e3b;color:#6ee7b7':t.status==='진행중'?'background:#1c1917;color:#fbbf24':'background:#1e293b;color:var(--dim)'}">${_e(t.status||'대기')}</div>
    <div class="dp-content">${_e(t.result||t.detail||t.description||'결과 없음')}</div>
  `;
  document.body.appendChild(popup);
  const closer=e=>{if(!popup.contains(e.target)){popup.remove();document.removeEventListener('click',closer)}};
  setTimeout(()=>document.addEventListener('click',closer),100);
}

// ─── Command Bar ───
function directMsg(name){const i=$('cmd-input');i.value='@'+name+' ';i.focus()}
function _setCmdBarLock(locked,msg){
  const inp=$('cmd-input'),btn=$('cmd-send-btn');
  if(locked){
    if(inp){inp.disabled=true;inp.placeholder=msg||'⏳ 준비 중...';inp.style.opacity='.4'}
    if(btn){btn.disabled=true;btn.style.opacity='.4'}
  }else{
    if(inp){inp.disabled=false;inp.placeholder='@에이전트 지시사항 입력...';inp.style.opacity=''}
    if(btn){btn.disabled=false;btn.style.opacity=''}
  }
}
async function send(){
  const i=$('cmd-input'),t=i.value.trim();if(!t||!cur)return;
  i.value='';
  try{await fetch(`/api/chat/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});
    toast('📤 전송됨')}catch(e){toast('❌ 전송 실패')}
}

// ─── Approvals ───
let _aprIdx=0,_aprSkipped=false;
function renderBanner(){
  const pend=approvals.filter(a=>a.status==='pending'&&(a.detail||a.title));
  const normalEl=$('cmd-normal'),aprEl=$('cmd-approval'),infoEl=$('apr-info'),commentEl=$('apr-comment');
  if(!pend.length||_aprSkipped){
    if(normalEl)normalEl.style.display='flex';
    if(aprEl)aprEl.style.display='none';
    return;
  }
  if(normalEl)normalEl.style.display='none';
  if(aprEl)aprEl.style.display='flex';
  _aprIdx=Math.max(0,Math.min(_aprIdx,pend.length-1));
  const a=pend[_aprIdx];
  if(infoEl)infoEl.innerHTML=`📋 ${_e((a.title||a.detail||'기안').substring(0,40))}<span class="apr-from">${_e(a.from_agent||'')} · ${pend.length>1?(_aprIdx+1)+'/'+pend.length:''}</span>`;
  if(commentEl)commentEl.value='';
}
function aprNav(dir){
  const pend=approvals.filter(a=>a.status==='pending'&&(a.detail||a.title));
  _aprIdx=(_aprIdx+dir+pend.length)%pend.length;
  renderBanner();
}
function aprSkip(){
  _aprSkipped=true;renderBanner();
  setTimeout(()=>{_aprSkipped=false;renderBanner()},30000);
}
async function aprResolve(res){
  const pend=approvals.filter(a=>a.status==='pending'&&(a.detail||a.title));
  if(!pend.length)return;
  const a=pend[_aprIdx];
  const comment=($('apr-comment')?.value||'').trim();
  try{
    const r=await fetch(`/api/approval-${res==='rejected'?'reject':'approve'}/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approval_id:a.id,response:comment,resolution:res})});
    const d=await r.json();
    if(d.error){toast('❌ '+d.error);return}
    toast(res==='approved'?'✅ 승인 완료':'❌ 반려 완료');
    approvals=approvals.filter(x=>x.id!==a.id);
    _aprIdx=0;
    renderBanner();
    fetch(`/api/approvals/${cur}?status=pending`).then(r=>r.json()).then(d=>{approvals=d;renderBanner();updateAprBadge()}).catch(()=>{});
  }catch(e){toast('❌ 오류: '+e.message)}
}
function resolve(id,res,comment){
  const idx=approvals.findIndex(a=>a.id===id);
  if(idx>=0){_aprIdx=idx;$('apr-comment').value=comment||'';aprResolve(res)}
}
function updateAprBadge(){
  const b=$('apr-badge');if(!b)return;
  const cnt=approvals.filter(a=>a.status==='pending').length;
  if(cnt>0){b.style.display='flex';b.textContent=cnt}else{b.style.display='none'}
}
function renderStats(){
  const s=$('hdr-stats');if(!s)return;let h='';
  if(costs&&costs.total_cost>0)h+=`<span style="background:#1c1917;padding:2px 6px;border-radius:8px">$${costs.total_cost.toFixed(4)}</span>`;
  if(tasks.length){const d=tasks.filter(t=>t.status==='완료').length;h+=` <span style="background:#0f2744;padding:2px 6px;border-radius:8px">${d}/${tasks.length}</span>`}
  s.innerHTML=h;
}

// ─── Side Drawer ───
let curDrawer=null;
function toggleDrawer(name){
  if(curDrawer===name){closeDrawer();return}
  curDrawer=name;
  document.querySelectorAll('.drawer-toggle button').forEach(b=>b.classList.remove('active'));
  const btn=$('dt-'+name);if(btn)btn.classList.add('active');
  const body=$('drawer-body'),title=$('drawer-title'),dl=$('dl-link');
  dl.style.display=name==='files'?'':'none';
  if(name==='tasks'){title.textContent='📋 작업';renderDrawerTasks(body)}
  else if(name==='approvals'){title.textContent='🔔 결재';renderDrawerApprovals(body)}
  else if(name==='plan'){title.textContent='🗂️ 계획 트리';fetchPlanTasks()}
  else if(name==='files'){title.textContent='📂 자료';renderDrawerFiles(body)}
  $('drawer').classList.add('open');
}
function openDrawerWith(name,titleText,html){
  curDrawer=name;
  $('drawer-title').textContent=titleText;
  $('drawer-body').innerHTML=html;
  $('dl-link').style.display='none';
  $('drawer').classList.add('open');
}
function closeDrawer(){curDrawer=null;$('drawer').classList.remove('open');document.querySelectorAll('.drawer-toggle button').forEach(b=>b.classList.remove('active'))}

function renderDrawerTasks(el){
  if(!tasks.length){el.innerHTML='<div style="color:var(--dim);text-align:center;padding:20px;font-size:11px">작업 없음</div>';return}
  el.innerHTML=tasks.map(t=>{const cls=t.status==='완료'?'done':t.status==='진행중'?'progress':'';
    return`<div class="task-item ${cls}"><span>${t.status==='완료'?'✅':t.status==='진행중'?'🔄':'⬜'}</span><span style="flex:1">${_e(t.title)}</span><span style="color:var(--dim);font-size:8px">${_e(t.agent_id||'')}</span></div>`}).join('');
}
function renderDrawerApprovals(el){
  const pend=approvals.filter(a=>a.status==='pending'&&(a.detail||a.title));
  if(!pend.length){el.innerHTML='<div style="color:var(--dim);text-align:center;padding:20px;font-size:11px">대기 중인 결재 없음</div>';return}
  el.innerHTML=pend.map(a=>`<div class="appr-card">
    <div style="font-size:11px;font-weight:600;color:var(--text)">${_e(a.title||a.approval_type||'기안')}</div>
    <div style="font-size:9px;color:var(--dim);margin:2px 0">${_e(a.from_agent||'')} · ${a.time||''}</div>
    <div style="font-size:10px;color:var(--text);white-space:pre-wrap;max-height:80px;overflow-y:auto;margin:4px 0">${_e((a.detail||'').substring(0,300))}</div>
    <input id="apr-comment-${a.id}" placeholder="코멘트 (선택)" style="width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:5px 8px;color:var(--text);font-size:10px;outline:none;margin:4px 0;box-sizing:border-box">
    <div style="display:flex;gap:4px">
      <button onclick="resolve('${a.id}','approved',document.getElementById('apr-comment-${a.id}')?.value)" style="background:#064e3b;color:#6ee7b7">✅ 승인</button>
      <button onclick="resolve('${a.id}','rejected',document.getElementById('apr-comment-${a.id}')?.value)" style="background:#7f1d1d;color:#fca5a5">❌ 반려</button>
    </div>
  </div>`).join('');
}
function renderDrawerFiles(el){
  fetch(`/api/deliverables/${cur}`).then(r=>r.json()).then(files=>{
    if(!files.length){el.innerHTML='<div style="color:var(--dim);text-align:center;padding:20px;font-size:11px">결과물 없음</div>';return}
    el.innerHTML=files.slice(0,30).map(f=>{
      const ext=f.path.split('.').pop().toLowerCase();
      const icon=ext==='md'?'📝':ext==='png'?'🖼️':ext==='json'?'📋':'📄';
      return`<div class="file-item" onclick="window.open('/api/file/${cur}/${f.path}','_blank')"><span>${icon}</span><span style="flex:1;color:#60a5fa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${_e(f.path)}</span><span style="color:var(--dim);font-size:8px">${f.modified||''}</span></div>`}).join('');
  }).catch(()=>{el.innerHTML='<div style="color:var(--dim);font-size:10px">로드 실패</div>'});
  fetch(`/api/newspaper/${cur}`).then(r=>r.json()).then(d=>{
    if(d.newspaper)el.innerHTML+=`<div style="margin-top:12px;font-size:10px;font-weight:600;color:var(--dim);margin-bottom:4px">📊 리포트</div><div style="font-size:10px;color:var(--text);white-space:pre-wrap;line-height:1.5;background:var(--card);border-radius:6px;padding:8px">${_e(d.newspaper)}</div>`;
  }).catch(()=>{});
}

// ─── Plan Tree ───
let _planTasks=[],_planAddPar=null;
async function fetchPlanTasks(){
  if(!cur)return;
  try{const r=await fetch(`/api/plan-tasks/${cur}`);_planTasks=await r.json();renderPlanTree()}catch(e){}
}
function renderPlanTree(){
  const el=$('drawer-body');if(!el||curDrawer!=='plan')return;
  if(!_planTasks.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dim);font-size:10px">📋 에이전트가 작업하면 자동 생성됩니다<br><span style="font-size:9px;cursor:pointer;color:var(--accent)" onclick="planAddStart(null)">＋ 직접 추가</span></div>';return}
  const roots=_planTasks.filter(t=>!t.parent_id);
  const co=cos.find(c=>c.id===cur);
  let h='<div class="plan-tree"><div class="plan-root">';
  h+=_planAddInline(null);
  roots.forEach(t=>{h+=_planNode(t,co)});
  h+='</div></div>';
  el.innerHTML=h;
}
function _planAddInline(pid){
  const k=pid||'root';if(_planAddPar!==k)return'';
  const co=cos.find(c=>c.id===cur);
  const opts=(co?.agents||[]).map(a=>`<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('');
  return`<div class="plan-add-inline"><input id="pai-${k}" placeholder="작업 제목..." onkeydown="if(event.key==='Enter')planAddSubmit('${pid||''}');if(event.key==='Escape')planAddCancel()"><select id="paa-${k}" style="background:#0f172a;border:1px solid #1e3a5f;border-radius:4px;padding:2px 4px;color:var(--text);font-size:10px;max-width:80px"><option value="">담당</option>${opts}</select><button onclick="planAddSubmit('${pid||''}')" style="background:var(--accent);color:white;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer">↵</button><button onclick="planAddCancel()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px">✕</button></div>`;
}
function _planNode(t,co){
  const s=t.status||'todo';
  const chkCls=s==='done'?'done':s==='in-progress'?'progress':'';
  const chkIcon=s==='done'?'✓':s==='in-progress'?'↻':'';
  const lblCls=s==='done'?'done':s==='in-progress'?'progress':'';
  const kids=_planTasks.filter(c=>c.parent_id===t.id);
  const total=kids.length,done=kids.filter(c=>c.status==='done').length;
  const ag=(co?.agents||[]).find(a=>a.id===t.agent_id);
  const agTag=ag?`<span class="plan-agent">${ag.emoji||''} ${ag.name||t.agent_id}</span>`:(t.agent_id?`<span class="plan-agent">${t.agent_id}</span>`:'');
  let h=`<div class="plan-node" id="pn-${t.id}"><div class="plan-row" onclick="planCycle('${t.id}')"><div class="plan-chk ${chkCls}" title="상태 변경">${chkIcon}</div><span class="plan-label ${lblCls}">${_e(t.title)}</span>${agTag}<div class="plan-acts" onclick="event.stopPropagation()"><button onclick="planAddStart('${t.id}')" title="하위 추가">＋</button><button onclick="planDel('${t.id}')" title="삭제">✕</button></div></div>`;
  if(total>0)h+=`<div class="plan-pbar"><div class="plan-pfill" style="width:${Math.round(done/total*100)}%"></div></div>`;
  h+=_planAddInline(t.id);
  kids.forEach(c=>{h+=_planNode(c,co)});
  h+='</div>';return h;
}
function planAddStart(pid){_planAddPar=pid||'root';renderPlanTree();setTimeout(()=>{const el=document.getElementById('pai-'+(pid||'root'));if(el)el.focus()},50)}
function planAddCancel(){_planAddPar=null;renderPlanTree()}
async function planAddSubmit(pid){
  const k=pid||'root',inp=document.getElementById('pai-'+k),sel=document.getElementById('paa-'+k);
  const title=(inp?.value||'').trim();if(!title){planAddCancel();return}
  _planAddPar=null;
  try{const r=await fetch(`/api/plan-task-add/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,parent_id:pid||null,agent_id:sel?.value||'',status:'todo'})});
    const d=await r.json();if(d.ok){_planTasks.push(d.task);renderPlanTree()}else toast('추가 실패')}catch(e){toast('오류')}
}
async function planCycle(id){
  const t=_planTasks.find(x=>x.id===id);if(!t)return;
  const nxt={todo:'in-progress','in-progress':'done',done:'todo',blocked:'todo'};
  t.status=nxt[t.status]||'todo';renderPlanTree();
  try{await fetch(`/api/plan-task-update/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:t.status})})}catch(e){}
}
async function planDel(id){
  const t=_planTasks.find(x=>x.id===id);if(!t||!confirm(`"${t.title}" 삭제?`))return;
  try{const r=await fetch(`/api/plan-task-delete/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
    const d=await r.json();if(d.ok){const rm=new Set();const col=i=>{rm.add(i);_planTasks.filter(x=>x.parent_id===i).forEach(x=>col(x.id))};col(id);_planTasks=_planTasks.filter(x=>!rm.has(x.id));renderPlanTree()}else toast('삭제 실패')}catch(e){toast('오류')}
}

// ─── CRUD ───
function openCreate(){$('create-modal').classList.add('show')}
async function createCo(){
  const n=$('c-name').value.trim(),t=$('c-topic').value.trim();if(!n)return;
  const btn=document.querySelector('#create-modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='⏳ 에이전트 생성 중...'}
  try{
    const r=await(await fetch('/api/companies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,topic:t,lang})})).json();
    if(r.ok){
      $('create-modal').classList.remove('show');$('c-name').value='';$('c-topic').value='';
      const agentCount=(r.company.agents||[]).length;
      cur=r.company.id;load();
      _setCmdBarLock(true,`⏳ ${agentCount}개 에이전트 등록 중...`);
      toast(`🏢 ${n} 생성됨 — ${agentCount}개 에이전트 등록 중...`);
      _watchAgentReady(r.company.id,agentCount);
    }else toast('❌ 생성 실패: '+(r.error||''));
  }catch(e){toast('❌ 생성 오류')}
  if(btn){btn.disabled=false;btn.textContent='생성'}
}
function _watchAgentReady(cid,total){
  let _interval=setInterval(async()=>{
    try{
      const c=await(await fetch(`/api/company/${cid}`)).json();
      if(!c||!c.agents){clearInterval(_interval);return}
      const ready=c.agents.filter(a=>a.status==='active').length;
      const registering=c.agents.filter(a=>a.status==='registering');
      if(ready>=total){
        clearInterval(_interval);
        toast(`✅ 모든 에이전트 준비 완료!`);
        _setCmdBarLock(false);
        renderIconGrid();
      }else{
        const names=registering.map(a=>a.emoji+' '+a.name).join(', ');
        toast(`⏳ ${ready}/${total} 준비 — ${names}`);
      }
    }catch(e){clearInterval(_interval)}
  },5000);
  setTimeout(()=>{clearInterval(_interval);_setCmdBarLock(false)},180000);
}
async function delCo(id,name){
  if(!confirm(`"${name}" 삭제?`))return;
  toast('🗑️ 삭제 중...');
  try{
    const r=await fetch('/api/company/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
    const d=await r.json();
    if(d.ok){toast('✅ 삭제 완료');cur=null;load()}
    else toast('❌ 삭제 실패');
  }catch(e){toast('❌ 삭제 오류')}
}
function fp(n,r,e){$('a-name').value=n;$('a-role').value=r;$('a-emoji').value=e}
async function openAgent(){
  const s=$('a-parent'),c=cos.find(x=>x.id===cur);s.innerHTML='<option value="">리더 직속</option>';
  if(c)(c.agents||[]).forEach(a=>s.innerHTML+=`<option value="${a.id}">${a.emoji} ${a.name}</option>`);
  const m=$('a-model');m.innerHTML='<option value="">기본</option>';
  try{const r=await(await fetch('/api/models')).json();(r.models||[]).forEach(x=>m.innerHTML+=`<option value="${x.id}">${x.name}</option>`)}catch(e){}
  $('agent-modal').classList.add('show');
}
async function addAgent(){
  const n=$('a-name').value.trim(),r=$('a-role').value.trim();if(!n||!r)return alert('이름과 역할 입력');
  toast(n+' 생성 중...');
  try{const res=await(await fetch(`/api/agent-add/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,role:r,emoji:$('a-emoji').value,parent_agent:$('a-parent').value,model:$('a-model').value})})).json();
    if(res.ok){toast(n+' 추가됨');$('agent-modal').classList.remove('show');refresh()}}catch(e){toast('오류')}
}
function dl(){if(cur)window.open('/api/download/'+cur)}

// ─── Outsourcing ───
function openOutsource(){
  if(!cur){toast('회사를 먼저 선택하세요');return}
  if(cos.length<2){toast('아웃소싱할 다른 회사가 필요합니다.');return}
  const sel=$('os-company');
  sel.innerHTML=cos.filter(c=>c.id!==cur).map(c=>`<option value="${c.id}">${_e(c.name)}</option>`).join('');
  sel.onchange=()=>{
    const tid=sel.value;const tc=cos.find(c=>c.id===tid);
    const as=$('os-agent');as.innerHTML='<option value="">리더 자동선택</option>';
    if(tc)(tc.agents||[]).forEach(a=>as.innerHTML+=`<option value="${a.id}">${a.emoji} ${a.name} (${a.role||''})</option>`);
  };
  sel.onchange();
  $('os-text').value='';
  $('outsource-modal').classList.add('show');
}
async function sendOutsource(){
  const to_cid=$('os-company').value;
  const to_agent=$('os-agent').value;
  const text=$('os-text').value.trim();
  if(!text){toast('의뢰 내용을 입력하세요');return}
  try{
    const r=await(await fetch('/api/cross-nudge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_cid:cur,to_cid,from_agent:'',to_agent,text})})).json();
    if(r.ok){toast(`🔗 ${r.to}에 의뢰 전송 완료`);$('outsource-modal').classList.remove('show')}
    else toast('실패: '+(r.error||''))
  }catch(e){toast('오류: '+e.message)}
}

// ─── Toast ───
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;let s=$('toasts');if(!s){s=document.createElement('div');s.id='toasts';s.className='toasts';document.body.appendChild(s)}s.appendChild(el);setTimeout(()=>el.remove(),3000)}

// ─── Search ───
let _st=null;
function debounceSearch(q){clearTimeout(_st);if(!q||q.length<2){$('search-results').style.display='none';return}_st=setTimeout(()=>doSearch(q),350)}
async function doSearch(q){
  const el=$('search-results');el.style.display='block';el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">검색 중...</div>';
  try{const r=await(await fetch(`/api/search?q=${encodeURIComponent(q)}`)).json();
    if(!r.length){el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">결과 없음</div>';return}
    el.innerHTML=r.slice(0,8).map(x=>`<div style="padding:6px 10px;border-bottom:1px solid #1e293b;cursor:pointer;font-size:10px" onclick="sel('${x.company_id}');$('search-results').style.display='none'"><span style="color:#60a5fa">${_e(x.from||'')}</span> ${_e((x.text||'').substring(0,60))}</div>`).join('')}
  catch(e){el.innerHTML='<div style="padding:8px;color:var(--red);font-size:10px">오류</div>'}
}
document.addEventListener('click',e=>{if(!e.target.closest('#search')&&!e.target.closest('#search-results'))$('search-results').style.display='none'});

// ─── SSE ───
let sseTimer=null;
function connectSSE(){
  if(sseTimer)clearTimeout(sseTimer);
  const es=new EventSource('/api/sse');
  es.addEventListener('init',e=>{try{cos=JSON.parse(e.data);renderTabs()}catch(e){}});
  es.addEventListener('agent_thinking',e=>{try{const d=JSON.parse(e.data);
    thinking[d.cid+':'+d.agent_id]={};
    if(d.cid===cur){renderIconGrid();renderStatusPanel()}
  }catch(e){}});
  es.addEventListener('agent_done',e=>{try{const d=JSON.parse(e.data);
    notify('✅ 작업 완료',(d.agent_name||d.agent_id)+' 작업 완료');
    delete thinking[d.cid+':'+d.agent_id];
    if(d.cid===cur){
      renderIconGrid();renderStatusPanel();
      extras();
      if(curDrawer==='tasks')renderDrawerTasks($('drawer-body'));
      if(curDrawer==='plan')fetchPlanTasks();
    }
  }catch(e){}});
  es.addEventListener('approval',e=>{try{notify('🔔 결재 요청','새로운 승인 요청이 도착했습니다');if(cur)fetch(`/api/approvals/${cur}?status=pending`).then(r=>r.json()).then(d=>{approvals=d;renderBanner();updateAprBadge()}).catch(()=>{})}catch(e){}});
  es.addEventListener('company_update',e=>{try{const d=JSON.parse(e.data);
    if(d.deleted){cos=cos.filter(c=>c.id!==d.id);renderTabs();if(cur===d.id){cur=cos.length?cos[0].id:null;cur?refresh():load()}return}
    if(!d.company||!d.id)return;const i=cos.findIndex(c=>c.id===d.id);if(i>=0)cos[i]=d.company;else cos.push(d.company);renderTabs();
    if(d.id!==cur)return;
    const c=d.company,chat=c.chat||[];
    chat.slice(lastLen).forEach(m=>{
      if(m.type==='agent'&&m.from){
        const ag=(c.agents||[]).find(a=>a.name===m.from);
        if(ag)pushSpeech(ag.id,m.text||'',m.from,ag.emoji||'🤖',m.time||'');
        if((m.text||'').includes('외주')||(m.text||'').includes('outsourc'))notify('🔗 외주 결과',m.from+': '+(m.text||'').substring(0,60));
      }
    });
    lastLen=chat.length;
    renderIconGrid();renderStatusPanel();
  }catch(e){}});
  es.onerror=()=>{es.close();sseTimer=setTimeout(connectSSE,3000)};
}

// ─── Init ───
document.addEventListener('DOMContentLoaded',()=>{checkLang();initNotif()});
load();connectSSE();
